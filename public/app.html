<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script>
// ── Subscription gate ──────────────────────────────────────────────────────
// Runs before anything renders. If no valid token, sends to access page.
(async function(){
  const token = sessionStorage.getItem('sotd_token');
  if (!token) { window.location.replace('/access.html'); return; }
  try {
    const res  = await fetch('/api/verify-token?token=' + encodeURIComponent(token));
    const data = await res.json();
    if (!data.valid) {
      sessionStorage.removeItem('sotd_token');
      window.location.replace('/access.html');
    }
  } catch(e) {
    // Network error — allow offline use if token exists locally
    // (remove this catch block if you want strict online-only enforcement)
  }
})();
// ──────────────────────────────────────────────────────────────────────────
</script>
<title>Saint of the Day</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#1e2a4a">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+SC:wght@600;700&family=Cormorant:ital,wght@0,500;0,600;1,500&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
  :root{
    --indigo: #1B2238;
    --indigo-deep: #11152A;
    --parchment: #F1E6CB;
    --parchment-dim: #E7D9B6;
    --gold: #C8A24A;
    --gold-bright: #E3C275;
    --burgundy: #7A1F2B;
    --ink: #2E2417;
    --moss: #56684B;
  }

  *{ box-sizing: border-box; }

  html,body{
    margin:0;
    min-height:100vh;
    background: radial-gradient(ellipse at 50% -10%, #2A3354 0%, var(--indigo) 45%, var(--indigo-deep) 100%);
    font-family: 'EB Garamond', serif;
    color: var(--parchment);
    display:flex;
    align-items:center;
    justify-content:center;
    padding: 32px 16px 56px;
  }

  .stage{
    width:100%;
    max-width:430px;
    display:flex;
    flex-direction:column;
    align-items:center;
  }

  .app-label{
    font-family:'Cormorant SC', serif;
    letter-spacing:0.22em;
    font-size:12.5px;
    color: var(--gold-bright);
    text-transform:uppercase;
    margin-bottom:18px;
    opacity:0.85;
  }

  /* ---- ring binding ---- */
  .rings{
    display:flex;
    gap:34px;
    margin-bottom:-13px;
    z-index:3;
  }
  .rings span{
    width:18px;
    height:18px;
    border-radius:50%;
    background: var(--indigo-deep);
    box-shadow:
      inset 0 2px 3px rgba(0,0,0,0.55),
      0 1px 0 rgba(241,230,202,0.15);
  }

  /* ---- card ---- */
  .card-wrap{
    position:relative;
    width:100%;
    perspective: 1400px;
  }

  .card{
    position:relative;
    width:100%;
    background: var(--parchment);
    color: var(--ink);
    border-radius: 6px 6px 2px 2px;
    padding: 34px 30px 26px;
    box-shadow:
      0 22px 50px -10px rgba(0,0,0,0.55),
      0 2px 0 rgba(255,255,255,0.4) inset;
    text-align:center;
    transform-origin: top center;
    backface-visibility:hidden;
  }

  .card.turning{
    animation: leaf-turn 0.62s cubic-bezier(.4,0,.2,1);
  }
  @media (prefers-reduced-motion: reduce){
    .card.turning{ animation:none; }
  }
  @keyframes leaf-turn{
    0%   { transform: rotateX(0deg); opacity:1; }
    48%  { transform: rotateX(-92deg); opacity:0.25; }
    52%  { transform: rotateX(92deg); opacity:0.25; }
    100% { transform: rotateX(0deg); opacity:1; }
  }

  .eyebrow{
    font-family:'Cormorant SC', serif;
    letter-spacing:0.18em;
    text-transform:uppercase;
    font-size:13px;
    color: var(--burgundy);
    margin:0 0 2px;
  }
  .big-date{
    font-family:'Cormorant', serif;
    font-weight:600;
    font-size:42px;
    line-height:1;
    margin:0 0 18px;
    color: var(--ink);
  }
  .big-date sup{
    font-size:18px;
    top:-0.9em;
  }

  /* ---- medallion ---- */
  .medallion-frame{
    width:128px;
    height:128px;
    margin:0 auto 18px;
    border-radius:50%;
    background: conic-gradient(from 180deg, var(--gold), #fff6dc, var(--gold), var(--gold-bright), var(--gold));
    padding:5px;
    box-shadow: 0 8px 18px -6px rgba(0,0,0,0.45);
    position:relative;
  }
  .medallion-frame::after{
    content:"";
    position:absolute;
    inset:-9px;
    border-radius:50%;
    border:1px solid rgba(200,162,74,0.55);
    animation: glow 4.5s ease-in-out infinite;
  }
  @keyframes glow{
    0%,100%{ opacity:0.45; }
    50%{ opacity:0.9; }
  }
  .medallion{
    width:100%;
    height:100%;
    border-radius:50%;
    overflow:hidden;
    background: var(--burgundy);
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .medallion img{
    width:100%;
    height:100%;
    object-fit:cover;
    object-position: top center;
    display:block;
  }
  .medallion .fallback-initial{
    font-family:'Cormorant SC', serif;
    font-size:54px;
    color: var(--gold-bright);
    font-weight:700;
  }

  .saint-name{
    font-family:'Cormorant', serif;
    font-weight:600;
    font-size:30px;
    line-height:1.15;
    margin: 2px 0 4px;
    color: var(--ink);
  }
  .saint-title{
    font-family:'EB Garamond', serif;
    font-style:italic;
    font-size:15px;
    color: var(--moss);
    margin:0 0 6px;
  }
  .saint-born{
    font-family:'Cormorant SC', serif;
    letter-spacing:0.04em;
    font-size:12px;
    color: var(--moss);
    opacity:0.85;
    margin:0 0 18px;
    text-transform:uppercase;
  }
  .bio-block{
    text-align:left;
    margin-top:14px;
    padding-top:12px;
    border-top:1px solid rgba(46,36,23,0.14);
  }
  .bio-text{
    font-family:'EB Garamond', serif;
    font-size:14.5px;
    line-height:1.55;
    color: var(--ink);
    opacity:0.88;
    margin:0;
  }

  .quote-block{
    position:relative;
    margin: 0 4px 6px;
    padding: 4px 6px 0;
  }
  .quote-mark{
    font-family:'Cormorant', serif;
    font-size:40px;
    color: var(--gold);
    line-height:0.4;
    display:block;
    opacity:0.8;
  }
  .quote-text{
    font-family:'Cormorant', serif;
    font-style:italic;
    font-weight:500;
    font-size:20px;
    line-height:1.4;
    color: var(--burgundy);
    margin: 0 0 8px;
  }
  .reflection-text{
    font-family:'EB Garamond', serif;
    font-size:16.5px;
    line-height:1.55;
    color: var(--ink);
    margin: 4px 0 10px;
  }
  .attribution{
    font-family:'Cormorant SC', serif;
    letter-spacing:0.06em;
    font-size:13px;
    color: var(--moss);
  }
  .source-note{
    font-size:12px;
    color: var(--moss);
    opacity:0.75;
    margin-top:2px;
    font-style:italic;
  }
  .companion-note{
    font-size:12.5px;
    color: var(--ink);
    opacity:0.8;
    margin-top:12px;
    padding-top:10px;
    border-top:1px solid rgba(122,31,43,0.18);
    line-height:1.4;
  }

  /* perforated tear edge under card */
  .perf{
    width:100%;
    height:13px;
    margin-top:-2px;
    background-image:
      linear-gradient(135deg, transparent 50%, var(--parchment) 50%),
      linear-gradient(45deg, var(--parchment) 50%, transparent 50%);
    background-size: 17px 17px, 17px 17px;
    background-position: 0 0, 8.5px 0;
    filter: drop-shadow(0 6px 8px rgba(0,0,0,0.35));
  }

  /* ---- controls ---- */
  .controls{
    display:flex;
    align-items:center;
    justify-content:space-between;
    width:100%;
    margin-top:24px;
    gap:10px;
  }
  .nav-btn{
    background:transparent;
    border:1px solid rgba(200,162,74,0.45);
    color: var(--gold-bright);
    font-family:'Cormorant SC', serif;
    letter-spacing:0.08em;
    font-size:13px;
    padding:9px 14px;
    border-radius:30px;
    cursor:pointer;
    transition: background 0.2s, transform 0.15s;
    text-transform:uppercase;
    white-space:nowrap;
  }
  .nav-btn:hover{ background: rgba(200,162,74,0.12); }
  .nav-btn:active{ transform: scale(0.96); }
  .nav-btn:focus-visible{ outline:2px solid var(--gold-bright); outline-offset:2px; }

  .today-btn{
    background: var(--burgundy);
    border:1px solid var(--burgundy);
    color: var(--parchment);
    font-family:'Cormorant SC', serif;
    letter-spacing:0.1em;
    text-transform:uppercase;
    font-size:13px;
    padding:9px 16px;
    border-radius:30px;
    cursor:pointer;
    transition: filter 0.2s, transform 0.15s;
  }
  .today-btn:hover{ filter:brightness(1.15); }
  .today-btn:active{ transform: scale(0.96); }
  .today-btn:focus-visible{ outline:2px solid var(--gold-bright); outline-offset:2px; }

  .jump-row{
    margin-top:16px;
    display:flex;
    align-items:center;
    gap:8px;
    font-size:13px;
    color: rgba(241,230,202,0.65);
  }
  .jump-selects{
    display:flex;
    gap:8px;
    justify-content:center;
    margin-top:6px;
  }
  .jump-selects select{
    font-family:'Cormorant SC', serif;
    font-size:13px;
    background:var(--parchment);
    border:1px solid var(--gold);
    border-radius:4px;
    padding:4px 8px;
    color:var(--ink);
    cursor:pointer;
  }
  @media (max-width:380px){
    .card{ padding:28px 20px 22px; }
    .big-date{ font-size:36px; }
    .saint-name{ font-size:26px; }
    .quote-text{ font-size:18px; }
  }
</style>
</head>
<body>

<div class="stage">
  <div class="app-label">✠ Saint of the Day ✠</div>

  <div class="rings"><span></span><span></span><span></span></div>

  <div class="card-wrap">
    <div class="card" id="card">
      <p class="eyebrow" id="weekday">Friday</p>
      <h1 class="big-date" id="bigDate">Jun 19</h1>

      <div class="medallion-frame">
        <div class="medallion" id="medallion">
          <span class="fallback-initial" id="fallbackInitial">?</span>
        </div>
      </div>

      <h2 class="saint-name" id="saintName">Loading…</h2>
      <p class="saint-title" id="saintTitle"></p>
      <p class="saint-born" id="saintBorn"></p>

      <div class="quote-block" id="quoteBlock"></div>
      <div class="bio-block" id="bioBlock"></div>
    </div>
    <div class="perf"></div>
  </div>

  <div class="controls">
    <button class="nav-btn" id="prevBtn" aria-label="Previous day">‹ Prev</button>
    <button class="today-btn" id="todayBtn">Today</button>
    <button class="nav-btn" id="nextBtn" aria-label="Next day">Next ›</button>
  </div>

  <div class="jump-row">
    <label>Jump to a date</label>
    <div class="jump-selects">
      <select id="jumpMonth">
        <option value="0">January</option><option value="1">February</option>
        <option value="2">March</option><option value="3">April</option>
        <option value="4">May</option><option value="5">June</option>
        <option value="6">July</option><option value="7">August</option>
        <option value="8">September</option><option value="9">October</option>
        <option value="10">November</option><option value="11">December</option>
      </select>
      <select id="jumpDay">
        <!-- Days 1-31 filled by JS on load -->
      </select>
    </div>
  </div>
</div>

<script>
// ---------------------------------------------------------------
// Curated saint dataset. Keyed by "MM-DD" (recurs every year).
// type: "quote"  -> a documented saying, shown as a quotation
// type: "reflection" -> no reliable quote survives; a short honest note instead
// wiki: English Wikipedia article title, used to fetch a real portrait at runtime
// ---------------------------------------------------------------
const SAINTS = {
  // ---- January (fully researched against the General Roman Calendar) ----
  "01-01": { name:"Mary, Mother of God", title:"Solemnity", type:"quote", text:"Let it be done to me according to your word.", source:"Luke 1:38", wiki:"Mary,_mother_of_Jesus", bio:"The Church's oldest Marian feast, opening the new year with a celebration of Mary's motherhood of Jesus and a prayer for peace." },
  "01-02": { name:"Basil the Great & Gregory Nazianzen", title:"Bishops and Doctors of the Church", type:"quote", text:"The bread in your cupboard belongs to the hungry.", source:"St. Basil, from his preaching on social justice", wiki:"Basil_of_Caesarea", born:"330 (Basil), 329 (Gregory)", bio:"Lifelong friends from Cappadocia who both became bishops and Doctors of the Church, defending the divinity of Christ against the Arian heresy in the 4th century." },
  "01-03": { name:"The Holy Name of Jesus", title:"Optional Memorial", type:"quote", text:"At the name of Jesus every knee should bend.", source:"Philippians 2:10", wiki:null, bio:"A devotion dating to the Middle Ages, when preachers like Bernardine of Siena promoted the monogram 'IHS' as a focus for prayer on the name of Jesus." },
  "01-06": { name:"The Epiphany of the Lord", title:"Solemnity", type:"quote", text:"We saw his star, and have come to worship him.", source:"the Magi, Matthew 2:2", wiki:"Biblical_Magi", bio:"Commemorates the Magi's visit to the infant Jesus, traditionally marking the revelation of Christ to the wider, non-Jewish world." },
  "01-07": { name:"Raymond of Penyafort", title:"Priest", type:"reflection", text:"A Dominican canon lawyer who, legend says, once sailed home across the open sea standing on his own cloak rather than stay where his conscience couldn't rest.", wiki:"Raymond_of_Penyafort", born:"1175", bio:"A Spanish Dominican and canon lawyer who compiled the Church's scattered laws into one authoritative collection for Pope Gregory IX. Patron of canon lawyers." },
  "01-13": { name:"Hilary of Poitiers", title:"Bishop and Doctor of the Church", type:"quote", text:"The Church is never stronger than when she is attacked, never better known than when accused.", source:"Against Auxentius", wiki:"Hilary_of_Poitiers", born:"c. 315", bio:"A French bishop who converted from paganism as an adult and became one of the fiercest Western defenders of orthodox Christianity against Arianism." },
  "01-17": { name:"Anthony, Abbot", title:"Father of Monasticism", type:"quote", text:"I no longer fear God — I love Him.", source:"Sayings of the Desert Fathers", wiki:"Anthony_the_Great", born:"c. 251", bio:"An Egyptian who sold his inheritance at twenty to live alone in the desert, becoming the founding figure of Christian monasticism. Patron of monks." },
  "01-20": { name:"Sebastian", title:"Martyr", type:"reflection", text:"Tradition holds he survived a volley of arrows, then returned to confront the emperor over his persecution of Christians — and was martyred a second time.", wiki:"Saint_Sebastian", companions:"Shared today with St. Fabian, Pope and Martyr, said to have been chosen pope after a dove landed on his head.", born:"c. 256", bio:"A Roman soldier said to have served in Emperor Diocletian's court while secretly aiding persecuted Christians. Patron of athletes and soldiers." },
  "01-21": { name:"Agnes", title:"Virgin and Martyr", type:"quote", text:"He who chose me first shall have me.", source:"from her traditional Acts of martyrdom", wiki:"Agnes_of_Rome", born:"c. 291", bio:"A Roman girl of about twelve, executed for refusing marriage and renouncing her Christian faith. Patron of girls and engaged couples." },
  "01-22": { name:"Vincent, Deacon", title:"Deacon and Martyr", type:"quote", text:"I have always prayed to be exactly as I am now.", source:"his traditional Acts, said from the rack", wiki:"Vincent_of_Saragossa", born:"3rd century", bio:"A deacon of Saragossa tortured to death during the persecution of Diocletian, one of Spain's earliest and most venerated martyrs." },
  "01-24": { name:"Francis de Sales", title:"Bishop and Doctor of the Church", type:"quote", text:"Be who you are, and be that well.", source:"Introduction to the Devout Life", wiki:"Francis_de_Sales", born:"1567", bio:"A bishop of Geneva known for gentle, accessible spiritual writing aimed at laypeople rather than only clergy. Patron of writers and journalists." },
  "01-25": { name:"The Conversion of Saint Paul", title:"Feast", type:"quote", text:"I have competed well; I have finished the race.", source:"Paul's own words, 2 Timothy 4:7", wiki:"Paul_the_Apostle", born:"c. 5", bio:"Celebrates the moment a Pharisee named Saul, struck blind on the road to Damascus, became the Apostle Paul and the Church's most influential missionary." },
  "01-26": { name:"Timothy and Titus", title:"Bishops, Disciples of St. Paul", type:"reflection", text:"We know them almost entirely through Paul's letters to them — proof of how far a mentor's trust can carry a life of quiet service.", wiki:"Saint_Timothy", born:"1st century", bio:"Two young companions of Paul entrusted with leading early Christian communities — Timothy at Ephesus, Titus on the island of Crete." },
  "01-27": { name:"Angela Merici", title:"Virgin, Foundress of the Ursulines", type:"quote", text:"Beware of trying to accomplish anything by force.", source:"her Last Counsels", wiki:"Angela_Merici", born:"1474", bio:"An orphaned Italian laywoman who founded the Company of St. Ursula to educate poor girls, the first community of religious women not bound to a cloister." },
  "01-28": { name:"Thomas Aquinas", title:"Priest and Doctor of the Church", type:"quote", text:"There is nothing on earth more prized than true friendship.", source:"his writings", wiki:"Thomas_Aquinas", born:"1225", bio:"An Italian Dominican friar whose Summa Theologica became the most influential work of Catholic theology. Patron of students and universities." },
  "01-31": { name:"John Bosco", title:"Priest", type:"quote", text:"Act today in such a way that you need not blush tomorrow.", wiki:"John_Bosco", born:"1815", bio:"An Italian priest who built schools, workshops, and oratories for the street children of industrializing Turin. Patron of young people and apprentices." },

  // ---- February (fully researched against the General Roman Calendar) ----
  "02-02": { name:"The Presentation of the Lord", title:"Feast", type:"quote", text:"Now you may dismiss your servant in peace.", source:"Simeon, Luke 2:29", wiki:null, bio:"Also called Candlemas, this feast recalls Mary and Joseph presenting the infant Jesus at the Temple, where the elderly Simeon recognized him as the promised Messiah." },
  "02-03": { name:"Blaise", title:"Bishop and Martyr", type:"reflection", text:"Almost nothing of his own words survives; he's remembered chiefly for healing a boy choking on a fishbone, which is why throats are still blessed in his name every February 3.", wiki:"Saint_Blaise", companions:"Shared today with St. Ansgar, the 'Apostle of the North,' who spent thirty-five years evangelizing Scandinavia and watched much of it lapse back into paganism in his own lifetime.", born:"4th century", bio:"An Armenian bishop and physician martyred under Licinius; medieval legend credits him with healing a choking child, which is why throats are blessed in his name." },
  "02-05": { name:"Agatha", title:"Virgin and Martyr", type:"quote", text:"Lord, my Creator, you have protected me since the cradle — receive now my soul.", source:"from her traditional Acts of martyrdom", wiki:"Agatha_of_Sicily", born:"c. 231", bio:"A Sicilian noblewoman tortured for refusing the advances of a Roman official; one of seven women named in the Roman Canon of the Mass." },
  "02-06": { name:"Paul Miki and Companions", title:"Martyrs", type:"quote", text:"I forgive my persecutors. I do not hate them.", source:"said from the cross, Nagasaki, 1597", wiki:"Paul_Miki", born:"c. 1562", bio:"A Japanese Jesuit brother crucified alongside twenty-five companions in Nagasaki in 1597, among the first martyrs of the Japanese Church." },
  "02-08": { name:"Josephine Bakhita", title:"Virgin", type:"quote", text:"Today, I am definitely free.", source:"said of her own emancipation", wiki:"Josephine_Bakhita", companions:"Shared today with St. Jerome Emiliani, Priest, founder of the Somascan Fathers, who once told his hungry orphans, \"Do not doubt, my sons, the Lord will take care!\"", born:"c. 1869", bio:"A Sudanese woman kidnapped and enslaved as a child, who later gained freedom in Italy and became a Canossian sister. Patron of Sudan and trafficking survivors." },
  "02-10": { name:"Scholastica", title:"Virgin", type:"quote", text:"I asked a favor of you and you refused it. I asked God, and He granted it.", source:"to her brother St. Benedict, recorded by St. Gregory the Great", wiki:"Scholastica", born:"c. 480", bio:"Twin sister of St. Benedict and founder of one of the earliest communities of Benedictine nuns, near Monte Cassino." },
  "02-11": { name:"Our Lady of Lourdes", title:"Optional Memorial", type:"quote", text:"I am the Immaculate Conception.", source:"words reported by St. Bernadette Soubirous, 1858", wiki:"Our_Lady_of_Lourdes", bio:"Commemorates the 1858 apparitions of Mary to fourteen-year-old Bernadette Soubirous in a grotto at Lourdes, France, now a major pilgrimage site associated with healing." },
  "02-14": { name:"Cyril & Methodius", title:"Monk and Bishop", type:"quote", text:"However worn out I am, I go with joy for the sake of the faith.", source:"St. Cyril, traditionally attributed", wiki:"Saints_Cyril_and_Methodius", born:"827 (Cyril), 815 (Methodius)", bio:"Greek brothers who devised a Slavic alphabet to translate Scripture and the liturgy, earning the title 'Apostles to the Slavs.' Co-patrons of Europe." },
  "02-17": { name:"The Seven Holy Founders", title:"Founders of the Servite Order", type:"reflection", text:"Seven Florentine cloth merchants who, in 1233, walked away from their trades together to live in penance and devotion to Mary, founding the Servite Order.", wiki:null, bio:"Seven wealthy Florentine merchants who in 1233 gave up their trades to live in penance on Monte Senario, founding the Servite Order." },
  "02-21": { name:"Peter Damian", title:"Bishop and Doctor of the Church", type:"quote", text:"Those who do not love the Cross of Christ do not love Christ.", source:"Sermo XVIII", wiki:"Peter_Damian", born:"1007", bio:"A Benedictine monk and cardinal who relentlessly campaigned against corruption and clerical misconduct in the 11th-century Church." },
  "02-22": { name:"The Chair of Saint Peter", title:"Feast", type:"quote", text:"You are the Christ, the Son of the living God.", source:"Peter's confession, Matthew 16:16", wiki:"Saint_Peter", bio:"Honors Peter's role as the first bishop of Rome and leader of the Apostles, a commemoration observed since at least the 4th century." },
  "02-23": { name:"Polycarp", title:"Bishop and Martyr", type:"quote", text:"Eighty-six years I have served Him, and He has done me no wrong. How can I blaspheme my King who saved me?", source:"said to the proconsul before his execution, recorded in The Martyrdom of Polycarp", wiki:"Polycarp", born:"c. 69", bio:"A disciple of the Apostle John who became bishop of Smyrna and was burned and stabbed to death at eighty-six for refusing to renounce Christ." },
  "02-27": { name:"Gregory of Narek", title:"Abbot and Doctor of the Church", type:"quote", text:"An encyclopedia of prayer for all nations.", source:"his own description of his Book of Lamentations", wiki:"Gregory_of_Narek", born:"c. 950", bio:"An Armenian monk-poet whose Book of Lamentations is considered one of the great mystical works of medieval Christianity. Patron of Armenia." },

  // ---- March onward (seed set so far — more on the way) ----
  "03-04": { name:"Casimir", title:"Prince", type:"reflection", text:"A Polish-Lithuanian prince who refused an arranged marriage and a life of luxury, sleeping on the floor and praying outside locked church doors at night rather than live as the heir he was raised to be.", wiki:"Saint_Casimir", born:"1458", bio:"A Polish-Lithuanian prince who refused a political marriage and royal comforts, dying of illness at twenty-five. Patron of Poland and Lithuania." },
  "03-07": { name:"Perpetua and Felicity", title:"Martyrs", type:"reflection", text:"Imprisoned together in Carthage, the two women refused to renounce their faith even as they faced execution.", wiki:"Perpetua_and_Felicity", born:"d. 203", bio:"A young noblewoman and her enslaved companion, executed together in the arena at Carthage; their martyrdom account is one of the earliest written partly by a woman." },
  "03-08": { name:"John of God", title:"Religious", type:"quote", text:"Labor without stopping; do all the good works you can while you still have the time.", wiki:"John_of_God", born:"1495", bio:"A Portuguese former soldier who, after a breakdown, devoted himself to nursing the sick and founded a hospital in Granada. Patron of hospitals and nurses." },
  "03-09": { name:"Frances of Rome", title:"Religious", type:"quote", text:"A married woman must, when called upon, leave her devotions to God at the altar to find Him in her household affairs.", wiki:"Frances_of_Rome", born:"1384", bio:"A Roman noblewoman who balanced marriage and motherhood with care for the poor, founding a community of women dedicated to charity." },
  "03-17": { name:"Patrick", title:"Bishop", type:"quote", text:"Christ with me, Christ before me, Christ behind me.", source:"traditionally attributed, the Lorica", wiki:"Saint_Patrick", born:"c. 385", bio:"A Romano-British missionary kidnapped as a slave to Ireland in his youth, who later returned as a bishop and became the island's patron saint." },
  "03-18": { name:"Cyril of Jerusalem", title:"Bishop and Doctor of the Church", type:"quote", text:"Lay aside things of the present, and put your faith in things to come.", source:"Catechetical Lecture I", wiki:"Cyril_of_Jerusalem", born:"c. 315", bio:"Bishop of Jerusalem whose catechetical lectures to new converts remain one of the best windows into 4th-century Christian teaching." },
  "03-19": { name:"Joseph", title:"Spouse of the Blessed Virgin Mary", type:"reflection", text:"Scripture records no words of his — only that he listened, and obeyed.", wiki:"Saint_Joseph", born:"1st century BC", bio:"The husband of Mary and Jesus' legal father, remembered for quiet obedience rather than any recorded words. Patron of workers and the universal Church." },
  "03-23": { name:"Turibius of Mogrovejo", title:"Bishop", type:"quote", text:"Time is not our own, and we must give a strict account of it.", wiki:"Turibius_de_Mogrovejo", born:"1538", bio:"A Spanish lawyer unexpectedly made Archbishop of Lima, where he spent twenty-five years traveling Peru on foot to evangelize and defend indigenous people." },
  "03-25": { name:"The Annunciation of the Lord", title:"Solemnity", type:"quote", text:"Do not be afraid, Mary, for you have found favor with God.", source:"the Angel Gabriel, Luke 1:30", wiki:null, bio:"Celebrates the moment the angel Gabriel told Mary she would conceive Jesus — placed nine months before Christmas." },
  "04-29": { name:"Catherine of Siena", title:"Virgin and Doctor of the Church", type:"quote", text:"Be who God meant you to be and you will set the world on fire.", source:"from her letters", wiki:"Catherine_of_Siena", born:"1347", bio:"An Italian Dominican laywoman and mystic who advised popes and helped persuade Gregory XI to return the papacy to Rome from Avignon. Doctor of the Church." },
  "05-26": { name:"Philip Neri", title:"Priest", type:"quote", text:"Cast yourself into the arms of God, and be sure He will catch you.", wiki:"Philip_Neri", born:"1515", bio:"A Florentine priest known as the 'Apostle of Rome' for his humor, joyful spirituality, and care for the city's youth and pilgrims." },
  "06-13": { name:"Anthony of Padua", title:"Priest and Doctor of the Church", type:"quote", text:"Actions speak louder than words; let your words teach, and your actions speak.", wiki:"Anthony_of_Padua", born:"1195", bio:"A Portuguese Franciscan famed for his preaching and miracles, now invoked by millions to help find lost items. Patron of lost articles and travelers." },
  "06-22": { name:"Thomas More", title:"Martyr", type:"quote", text:"I die the King's good servant, but God's first.", source:"said at his execution, 1535", wiki:"Thomas_More", companions:"Shared today with St. John Fisher, Bishop and Martyr.", born:"1478", bio:"An English lawyer, scholar, and Lord Chancellor executed by Henry VIII for refusing to recognize the king's authority over the Church." },
  "07-22": { name:"Mary Magdalene", title:"Witness to the Resurrection", type:"quote", text:"I have seen the Lord.", source:"John 20:18", wiki:"Mary_Magdalene", born:"1st century", bio:"A follower of Jesus present at the crucifixion and the first to encounter him risen from the tomb, earning her the title 'Apostle to the Apostles.'" },
  "07-31": { name:"Ignatius of Loyola", title:"Priest, Founder of the Jesuits", type:"quote", text:"Go forth and set the world on fire.", wiki:"Ignatius_of_Loyola", born:"1491", bio:"A Spanish soldier wounded in battle who underwent a profound conversion and founded the Jesuits, shaping Catholic education and spirituality for centuries." },
  "08-04": { name:"Jean Vianney", title:"Priest, the Curé of Ars", type:"quote", text:"The Mass is the soul of the priesthood.", wiki:"Jean_Vianney", born:"1786", bio:"A French parish priest in the small village of Ars who became famous for spending up to sixteen hours a day hearing confessions. Patron of parish priests." },
  "08-09": { name:"Teresa Benedicta of the Cross", title:"Virgin and Martyr (Edith Stein)", type:"quote", text:"Do not accept anything as truth if it lacks love.", wiki:"Edith_Stein", born:"1891", bio:"A German Jewish philosopher who converted to Catholicism and became a Carmelite nun, killed at Auschwitz in 1942." },
  "08-11": { name:"Clare of Assisi", title:"Virgin, Foundress of the Poor Clares", type:"reflection", text:"She traded a noble household for a bare floor, and called it freedom.", wiki:"Clare_of_Assisi", born:"1194", bio:"A noblewoman who left her family to follow Francis of Assisi, founding the Poor Clares, an order devoted to radical poverty." },
  "08-14": { name:"Maximilian Kolbe", title:"Priest and Martyr", type:"reflection", text:"At Auschwitz, he volunteered to die in the place of a stranger condemned to execution.", wiki:"Maximilian_Kolbe", born:"1894", bio:"A Polish Franciscan friar who volunteered to die in place of a stranger at Auschwitz in 1941, after the man was selected for starvation as punishment." },
  "08-28": { name:"Augustine of Hippo", title:"Bishop and Doctor of the Church", type:"quote", text:"Our heart is restless until it rests in You.", source:"Confessions", wiki:"Augustine_of_Hippo", born:"354", bio:"A North African bishop whose restless youth and dramatic conversion, recounted in his Confessions, made him one of Christianity's most influential theologians." },
  "09-03": { name:"Gregory the Great", title:"Pope and Doctor of the Church", type:"reflection", text:"He reorganized the Church's care for Rome's poor while gravely ill himself, and sent missionaries to England.", wiki:"Pope_Gregory_I", born:"c. 540", bio:"A Roman aristocrat who became pope amid plague and invasion, reorganizing the Church's care for the poor and sending missionaries to England." },
  "09-27": { name:"Vincent de Paul", title:"Priest", type:"quote", text:"Go to the poor; you will find God.", wiki:"Vincent_de_Paul", born:"1581", bio:"A French priest who organized large-scale charity for the poor and founded the Vincentians and, with Louise de Marillac, the Daughters of Charity." },
  "09-30": { name:"Jerome", title:"Priest and Doctor of the Church", type:"quote", text:"Ignorance of Scripture is ignorance of Christ.", wiki:"Jerome", born:"c. 342", bio:"A scholar-monk who translated the Bible into Latin — the Vulgate — a text that shaped Western Christianity for over a thousand years." },
  "10-01": { name:"Thérèse of the Child Jesus", title:"Virgin and Doctor of the Church", type:"quote", text:"I will spend my heaven doing good on earth.", source:"Story of a Soul", wiki:"Thérèse_of_Lisieux", born:"1873", bio:"A French Carmelite nun who died at twenty-four, leaving a spiritual memoir praising small, hidden acts of love known as her 'Little Way.'" },
  "10-04": { name:"Francis of Assisi", title:"Founder of the Franciscans", type:"quote", text:"Be praised, my Lord, through all your creatures.", source:"Canticle of the Creatures", wiki:"Francis_of_Assisi", born:"1181", bio:"A wealthy merchant's son who renounced his inheritance to live in poverty, founding the Franciscans and inspiring a renewal of simplicity in the medieval Church." },
  "10-15": { name:"Teresa of Jesus", title:"Virgin and Doctor of the Church (Teresa of Ávila)", type:"quote", text:"Let nothing disturb you; all things are passing — God never changes.", wiki:"Teresa_of_Ávila", born:"1515", bio:"A Spanish Carmelite mystic and reformer whose writings on prayer made her one of the few women named a Doctor of the Church." },
  "10-22": { name:"John Paul II", title:"Pope", type:"quote", text:"Be not afraid.", source:"from his inaugural homily, 1978", wiki:"Pope_John_Paul_II", born:"1920", bio:"A Polish pope whose 27-year papacy included a pivotal role in the fall of communism in Eastern Europe and the most-traveled pontificate in history." },
  "11-03": { name:"Martin de Porres", title:"Religious", type:"reflection", text:"Born outside marriage and refused full vows because of his race, he was made indispensable by his charity toward the poor.", wiki:"Martin_de_Porres", born:"1579", bio:"A Peruvian friar of mixed African and Spanish descent who, despite the racial restrictions of his time, became renowned for healing and charity toward the poor." },
  "11-17": { name:"Elizabeth of Hungary", title:"Religious", type:"reflection", text:"A princess who gave away her household's wealth to the poor, and died at twenty-four.", wiki:"Elizabeth_of_Hungary", born:"1207", bio:"A Hungarian princess married into German nobility who, after her husband's death, gave away her wealth to build a hospital for the poor." },
  "11-22": { name:"Cecilia", title:"Virgin and Martyr", type:"reflection", text:"Tradition holds she sang to God in her heart even as she faced martyrdom.", wiki:"Saint_Cecilia", born:"2nd–3rd century", bio:"A Roman martyr whose legend describes her singing to God even as she faced death, making her the patron saint of musicians." },
  "12-03": { name:"Francis Xavier", title:"Priest, Missionary", type:"reflection", text:"A Jesuit missionary said to have baptized tens of thousands across Asia in a single decade.", wiki:"Francis_Xavier", born:"1506", bio:"A Basque Jesuit co-founder who became one of history's most prolific missionaries, traveling across India, Southeast Asia, and Japan." },
  "12-06": { name:"Nicholas", title:"Bishop", type:"reflection", text:"A 4th-century bishop famed for secretly giving gifts to the poor — the root of the Santa Claus legend.", wiki:"Saint_Nicholas", born:"c. 270", bio:"A 4th-century Greek bishop in modern-day Turkey famed for secret gift-giving and generosity to the poor — the historical root of the Santa Claus legend." },
  "12-14": { name:"John of the Cross", title:"Priest and Doctor of the Church", type:"quote", text:"In the evening of life, we will be judged on love alone.", wiki:"John_of_the_Cross", born:"1542", bio:"A Spanish Carmelite mystic and poet who, with Teresa of Ávila, reformed the Carmelite order and wrote classics like Dark Night of the Soul." },
  "12-26": { name:"Stephen", title:"The First Martyr", type:"quote", text:"Lord, do not hold this sin against them.", source:"Acts 7:60", wiki:"Saint_Stephen", born:"1st century", bio:"One of the first seven deacons chosen by the apostles, stoned to death for his faith and traditionally honored as Christianity's first martyr." },
  "04-02": { name:"Francis of Paola", title:"Hermit", type:"reflection", text:"He called his fasting 'the Lent that never ends,' refusing meat, eggs, and dairy for his entire adult life.", wiki:"Francis_of_Paola", born:"1416", bio:"A Calabrian hermit who founded the Order of Minims, he became such a renowned wonder-worker that King Louis XI of France summoned him to his deathbed. Patron of mariners." },
  "04-04": { name:"Isidore of Seville", title:"Bishop and Doctor of the Church", type:"reflection", text:"As bishop of Seville for 37 years, he compiled a 20-volume encyclopedia of all known learning that remained a standard schoolbook in Europe for nine centuries.", wiki:"Isidore_of_Seville", born:"c. 560", bio:"He succeeded his own brother as bishop and helped unify Visigothic Spain under Nicene Christianity. Informally invoked by some today as a patron of the internet." },
  "04-05": { name:"Vincent Ferrer", title:"Priest", type:"quote", text:"Fear God and give him honor, for the hour of his judgment is coming.", source:"his motto, inscribed beneath his image, from Revelation 14:7", wiki:"Vincent_Ferrer", born:"1350", bio:"A Dominican preacher who drew enormous crowds across Spain and France warning of judgment, and helped end the Western Schism by persuading a rival claimant to the papacy to step down." },
  "04-07": { name:"John Baptist de la Salle", title:"Priest", type:"quote", text:"Let your example instruct your students much more than your words.", wiki:"Jean-Baptiste_de_La_Salle", born:"1651", bio:"A wealthy French priest who gave up status to train teachers and open free schools for poor children, founding the Brothers of the Christian Schools. Patron of teachers." },
  "04-11": { name:"Stanislaus", title:"Bishop and Martyr", type:"reflection", text:"As bishop of Kraków, he excommunicated King Bolesław II for his cruelty — and was killed by the king's own hand while celebrating Mass.", wiki:"Stanislaus_of_Szczepanów", born:"1030", bio:"His murder in 1079 forced the king into exile and helped cement Stanislaus as Poland's patron saint." },
  "04-13": { name:"Martin I", title:"Pope and Martyr", type:"reflection", text:"As pope, he condemned a heresy backed by the Byzantine emperor, who had him kidnapped from Rome, tried, and exiled to Crimea, where he died of mistreatment.", wiki:"Pope_Martin_I", bio:"The last pope venerated as a martyr, his defiance of imperial religious policy cost him the support of erstwhile allies who feared Byzantine reprisal." },
  "04-21": { name:"Anselm", title:"Bishop and Doctor of the Church", type:"quote", text:"I do not seek to understand in order to believe, but I believe in order to understand.", source:"Proslogion", wiki:"Anselm_of_Canterbury", born:"c. 1033", bio:"A Benedictine monk who became Archbishop of Canterbury, clashing repeatedly with English kings over the Church's independence from royal control." },
  "04-23": { name:"George", title:"Martyr", type:"reflection", text:"A Roman soldier beheaded under Diocletian around 303 for refusing to renounce his faith — the famous dragon-slaying legend wasn't attached to his story until centuries later.", wiki:"Saint_George", born:"c. 280", bio:"Patron of England, soldiers, and several other nations, almost nothing reliable is known of his actual life beyond his martyrdom.", companions:"Shared today with St. Adalbert of Prague, a Czech bishop killed by Baltic Prussians in 997 while trying to convert them to Christianity." },
  "04-25": { name:"Mark", title:"Evangelist", type:"reflection", text:"Traditionally the author of the earliest Gospel, written for a Roman audience in plain, fast-paced narrative, and founder of the church in Alexandria, Egypt.", wiki:"Mark_the_Evangelist", born:"1st century", bio:"His symbol, a winged lion, became the emblem of Venice after the city acquired his relics in the 9th century." },
  "04-28": { name:"Peter Chanel", title:"Priest and Martyr", type:"quote", text:"It does not matter whether or not I am killed; the religion has taken root on the island; it will not be destroyed by my death, since it comes not from men but from God.", source:"said shortly before his murder, Futuna, 1841", wiki:"Peter_Chanel", born:"1803", bio:"The first Catholic martyr of Oceania, he was clubbed and axed to death after a local chief's son asked to be baptized; the island converted to Christianity within two years of his death.", companions:"Shared today with St. Louis Grignion de Montfort, a French priest whose writings on Marian devotion, including True Devotion to Mary, shaped Catholic spirituality for centuries." },
  "04-30": { name:"Pius V", title:"Pope", type:"reflection", text:"As pope, he enforced the reforms of the Council of Trent, standardized the Roman Missal still used today in its traditional form, and organized the fleet that won the naval Battle of Lepanto in 1571.", wiki:"Pope_Pius_V", born:"1504", bio:"A former Dominican friar known for personal austerity even as pope, he remains one of the most consequential reforming popes of the Counter-Reformation." },
  "05-01": { name:"Joseph the Worker", title:"Optional Memorial", type:"reflection", text:"Instituted in 1955 to offer a Christian vision of labor alongside May Day's secular and political associations.", wiki:"Saint_Joseph", bio:"It honors Joseph's own trade as a carpenter, presenting ordinary work as a path to holiness rather than something separate from it." },
  "05-02": { name:"Athanasius", title:"Bishop and Doctor of the Church", type:"reflection", text:"Exiled five times for defending Christ's full divinity against Arianism, he became so famous for standing alone against prevailing opinion that historians coined the phrase 'Athanasius contra mundum' — Athanasius against the world.", wiki:"Athanasius_of_Alexandria", born:"c. 296", bio:"Bishop of Alexandria, his theological battles shaped the wording of the Nicene Creed still recited in churches today." },
  "05-03": { name:"Philip and James", title:"Apostles", type:"reflection", text:"Two of the Twelve Apostles — Philip, who brought Nathanael to Jesus, and James 'the Less,' often identified as a relative of Jesus and the first bishop of Jerusalem.", wiki:"James,_son_of_Alphaeus", born:"1st century", bio:"Their joint feast reflects an ancient tradition that their relics were enshrined together in Rome's Basilica of the Holy Apostles." },
  "05-10": { name:"John of Ávila", title:"Priest and Doctor of the Church", type:"reflection", text:"A Spanish priest so influential in his preaching that he's remembered as the 'Apostle of Andalusia,' personally encouraging the young Teresa of Ávila in her reforms.", wiki:"John_of_Ávila", born:"1500", bio:"Declared a Doctor of the Church in 2012, his writings on pastoral renewal influenced the Council of Trent's reforms of priestly formation." },
  "05-12": { name:"Nereus and Achilleus", title:"Martyrs", type:"reflection", text:"Roman soldiers turned Christian converts, martyred for refusing to continue serving in the army's persecutions.", wiki:"Nereus_and_Achilleus", born:"1st century", bio:"Among the earliest Roman martyrs, their tomb on the Via Ardeatina was already a pilgrimage site by the 4th century.", companions:"Shared today with St. Pancras, a fourteen-year-old Roman martyred under Diocletian, after whom London's Pancras railway station and district are named." },
  "05-13": { name:"Our Lady of Fátima", title:"Optional Memorial", type:"quote", text:"I am the Lady of the Rosary.", source:"words reported by the child visionaries, Fátima, Portugal, 1917", wiki:"Our_Lady_of_Fátima", bio:"Marks the first of six reported Marian apparitions to three shepherd children in rural Portugal during World War I, a devotion later promoted heavily by Pope John Paul II." },
  "05-14": { name:"Matthias", title:"Apostle", type:"reflection", text:"Chosen by lot to replace Judas among the Twelve, fulfilling Peter's call in Acts to fill the vacant apostolic seat.", wiki:"Matthias_the_Apostle", born:"1st century", bio:"Scripture records little else about him; later traditions place his missionary work and martyrdom anywhere from Judea to Georgia or Ethiopia." },
  "05-18": { name:"John I", title:"Pope and Martyr", type:"reflection", text:"Sent to Constantinople by an Arian Gothic king to negotiate on behalf of persecuted Western Christians, he was imprisoned on his return on suspicion of disloyalty and died from his treatment in custody.", wiki:"Pope_John_I", bio:"His death in 526 made him one of several early popes venerated as a martyr of political circumstance rather than outright persecution for the faith itself." },
  "05-20": { name:"Bernardine of Siena", title:"Priest", type:"reflection", text:"A Franciscan preacher who popularized the monogram 'IHS' for the Holy Name of Jesus, displaying it on a placard at the end of his sermons across Italy.", wiki:"Bernardine_of_Siena", born:"1380", bio:"Famed for restoring peace between feuding factions in Italian cities through his preaching, he's considered one of the most effective Franciscan preachers of the 15th century." },
  "05-21": { name:"Christopher Magallanes and Companions", title:"Martyrs", type:"reflection", text:"A Mexican priest shot without trial in 1927 during the Cristero anti-Catholic persecution, alongside twenty-four companion priests.", wiki:"Cristóbal_Magallanes_Jara", born:"1869", bio:"He was on his way to celebrate Mass when arrested; the group are now honored collectively as martyrs of the Mexican Cristero War." },
  "05-22": { name:"Rita of Cascia", title:"Religious", type:"reflection", text:"An Italian widow who, after her husband and both sons died in a cycle of family vendetta, joined an Augustinian convent and became known as the patron saint of impossible causes.", wiki:"Rita_of_Cascia", born:"1381", bio:"Devotees today often bring roses to her shrine in Cascia, recalling a legend of roses blooming out of season near her tomb." },
  "05-25": { name:"Bede the Venerable", title:"Priest and Doctor of the Church", type:"quote", text:"It is time for me to return to Him who formed me from nothing.", source:"his last words, recorded by his disciple Cuthbert", wiki:"Bede", born:"c. 672", bio:"An English Benedictine monk whose Ecclesiastical History of the English People remains the primary source for early Anglo-Saxon Christianity.", companions:"Shared today with Pope St. Gregory VII, a reforming pope who battled lay control over the appointment of bishops, and St. Mary Magdalene de' Pazzi, a Florentine Carmelite mystic." },
  "05-27": { name:"Augustine of Canterbury", title:"Bishop", type:"reflection", text:"Sent by Pope Gregory the Great in 597 to evangelize Anglo-Saxon England, he became the first Archbishop of Canterbury.", wiki:"Augustine_of_Canterbury", bio:"His mission converted King Æthelberht of Kent and laid the foundation for the English Church, though widespread conversion of England took generations more." },
  "05-29": { name:"Paul VI", title:"Pope", type:"reflection", text:"As pope, he closed the Second Vatican Council in 1965 and became the first pope in over 150 years to travel internationally, visiting six continents.", wiki:"Pope_Paul_VI", born:"1897", bio:"His 1968 encyclical Humanae Vitae on marriage and birth control remains one of the most debated papal documents of the 20th century." },
  "05-31": { name:"The Visitation of the Blessed Virgin Mary", title:"Feast", type:"quote", text:"My soul magnifies the Lord, and my spirit rejoices in God my Savior.", source:"Mary's Magnificat, Luke 1:46-47", wiki:null, bio:"Commemorates Mary's visit to her pregnant relative Elizabeth, where she spoke the prayer now known as the Magnificat, still recited daily in the Church's evening prayer." },
  "06-01": { name:"Justin", title:"Martyr", type:"reflection", text:"A pagan philosopher converted to Christianity through reasoned argument, he became one of the faith's first intellectual defenders before being beheaded in Rome around 165.", wiki:"Justin_Martyr", born:"c. 100", bio:"His First and Second Apology, addressed directly to Roman emperors, are among the earliest surviving Christian philosophical writings." },
  "06-02": { name:"Marcellinus and Peter", title:"Martyrs", type:"reflection", text:"A priest and an exorcist martyred together in Rome under Diocletian; legend says their own executioner converted after witnessing their faith.", wiki:"Marcellinus_and_Peter", bio:"Their names are recited daily in the Roman Canon of the Mass, among the Church's oldest list of venerated martyrs." },
  "06-03": { name:"Charles Lwanga and Companions", title:"Martyrs", type:"reflection", text:"A group of young Ugandan converts, several of them royal pages, burned alive in 1886 on the orders of King Mwanga II for refusing to renounce their new Christian faith.", wiki:"Charles_Lwanga", born:"c. 1860", bio:"Their martyrdom helped spark rapid growth of Christianity in Uganda; they are patrons of African youth and Catholic action." },
  "06-05": { name:"Boniface", title:"Bishop and Martyr", type:"reflection", text:"An English missionary who felled a sacred oak tree devoted to the Germanic god Thor to demonstrate Christianity's God was more powerful, and was later killed by axe while reading the Gospels to converts in Frisia.", wiki:"Saint_Boniface", born:"c. 675", bio:"Known as the 'Apostle of the Germans,' he reorganized the Church across Bavaria and Germany and remains one of England's most influential missionary exports." },
  "06-06": { name:"Norbert", title:"Bishop", type:"reflection", text:"A wealthy nobleman who, after narrowly surviving a lightning strike that threw him from his horse, abandoned a comfortable clerical post to found the reforming Premonstratensian order.", wiki:"Norbert_of_Xanten", born:"c. 1080", bio:"He later became Archbishop of Magdeburg and worked to end a papal schism, supporting the legitimate pope's claim." },
  "06-09": { name:"Ephrem", title:"Deacon and Doctor of the Church", type:"reflection", text:"Called the 'Harp of the Holy Spirit' for the hundreds of hymns he wrote to teach Christian doctrine to ordinary people in song.", wiki:"Ephrem_the_Syrian", born:"c. 306", bio:"A Syriac deacon, his poetic theology shaped Eastern Christian liturgy for centuries and still influences Syriac-rite worship today." },
  "06-11": { name:"Barnabas", title:"Apostle", type:"reflection", text:"A Jewish Levite from Cyprus who vouched for the newly converted Paul to the suspicious apostles in Jerusalem, then became his missionary companion.", wiki:"Barnabas", born:"1st century", bio:"The Acts of the Apostles calls him 'son of encouragement'; tradition holds he was later martyred in Cyprus." },
  "06-19": { name:"Romuald", title:"Abbot", type:"reflection", text:"An Italian nobleman who, after witnessing his father kill a man in a duel, retreated to a life of extreme penance and founded the Camaldolese, a hermit-monk order combining solitude with community.", wiki:"Romuald", born:"c. 951", bio:"He is said to have founded or reformed over a hundred monasteries and hermitages across Italy during his lifetime." },
  "06-21": { name:"Aloysius Gonzaga", title:"Religious", type:"reflection", text:"An Italian prince who renounced his inheritance and a guaranteed military career to join the Jesuits, then died at twenty-three nursing plague victims in Rome.", wiki:"Aloysius_Gonzaga", born:"1568", bio:"Patron of Christian youth and students, his short life is often held up as an example of renouncing privilege for service." },
  "06-24": { name:"The Nativity of Saint John the Baptist", title:"Solemnity", type:"quote", text:"He must become greater; I must become less.", source:"John the Baptist, John 3:30", wiki:"John_the_Baptist", bio:"Six months older than Jesus by tradition, John's birth is one of only three nativities the Church celebrates with its own feast, alongside Jesus and Mary." },
  "06-27": { name:"Cyril of Alexandria", title:"Bishop and Doctor of the Church", type:"reflection", text:"A fierce defender of Mary's title 'Mother of God' at the Council of Ephesus in 431, where he led the condemnation of a rival teacher's views on Christ.", wiki:"Cyril_of_Alexandria", born:"c. 376", bio:"His theological clashes were sometimes marked by harsh political tactics, but his writings on Christ's nature remain foundational for both Eastern and Western theology." },
  "06-28": { name:"Irenaeus", title:"Bishop, Martyr, and Doctor of the Church", type:"quote", text:"The glory of God is a human being fully alive.", source:"Against Heresies", wiki:"Irenaeus", born:"c. 130", bio:"A bishop of Lyon and disciple of Polycarp's circle, he wrote the era's most thorough rebuttal of Gnostic heresies. Declared a Doctor of the Church in 2022." },
  "06-29": { name:"Peter and Paul", title:"Solemnity", type:"quote", text:"Lord, you know everything; you know that I love you.", source:"Peter to the risen Jesus, John 21:17", wiki:"Saint_Peter", bio:"The Church's two greatest apostles, both martyred in Rome under Nero around the same era, are honored together on this solemnity recognizing the city's twin pillars of faith." },
  "06-30": { name:"The First Martyrs of the Holy Roman Church", title:"Optional Memorial", type:"reflection", text:"Commemorates Roman Christians scapegoated and executed by Emperor Nero after the Great Fire of Rome in 64 AD, the empire's first organized persecution of Christians.", wiki:null, bio:"Tradition holds both Peter and Paul died in this same wave of persecution, making these anonymous victims the seed of Rome's Christian community." },
  "07-03": { name:"Thomas", title:"Apostle", type:"quote", text:"My Lord and my God!", source:"John 20:28", wiki:"Thomas_the_Apostle", born:"1st century", bio:"Remembered as 'Doubting Thomas' for questioning the resurrection, but tradition holds he went on to evangelize as far as India, where Christian communities still trace their founding to him." },
  "07-04": { name:"Elizabeth of Portugal", title:"Optional Memorial", type:"reflection", text:"A Portuguese queen who used her position to broker peace between warring family members and neighboring kingdoms, earning the title 'the Peacemaker.'", wiki:"Elizabeth_of_Aragon", born:"1271", bio:"After her husband's death she lived as a Franciscan tertiary, devoting her wealth to hospitals and the poor." },
  "07-05": { name:"Anthony Zaccaria", title:"Priest", type:"reflection", text:"An Italian physician who became a priest and founded the Barnabites, promoting frequent Communion and public devotions at a time when both were rare.", wiki:"Anthony_Maria_Zaccaria", born:"1502", bio:"His reforms anticipated several practices later encouraged by the Council of Trent." },
  "07-06": { name:"Maria Goretti", title:"Virgin and Martyr", type:"quote", text:"I forgive him, and I want him with me in heaven.", source:"said of her attacker as she died, 1902", wiki:"Maria_Goretti", born:"1890", bio:"An eleven-year-old Italian girl stabbed for resisting a sexual assault, she became one of the youngest people ever canonized; her attacker later converted in prison, by his own account after she appeared to him in a dream." },
  "07-09": { name:"Augustine Zhao Rong and Companions", title:"Martyrs", type:"reflection", text:"Commemorates Chinese Catholics and missionaries martyred between the 17th and 20th centuries, including Zhao Rong, a former soldier-turned-priest who guarded a bishop being led to execution and was so moved he converted.", wiki:"Augustine_Zhao_Rong", bio:"Canonized together in 2000, they represent four centuries of Christian martyrdom in China." },
  "07-11": { name:"Benedict", title:"Abbot", type:"reflection", text:"His Rule for monasteries, balancing prayer, manual work, and community life, became the single most influential document in the history of Western monasticism.", wiki:"Benedict_of_Nursia", born:"c. 480", bio:"Patron of Europe, he founded the monastery at Monte Cassino; the motto 'ora et labora' — pray and work — distilled from his Rule still defines Benedictine life today." },
  "07-13": { name:"Henry", title:"Optional Memorial", type:"reflection", text:"A Holy Roman Emperor who used his political power to found dioceses, reform monasteries, and support the Church rather than to expand his territory through war.", wiki:"Henry_II,_Holy_Roman_Emperor", born:"973", bio:"He and his wife Cunigunde reportedly lived as a celibate couple; he's one of the few rulers canonized primarily for personal holiness rather than martyrdom." },
  "07-14": { name:"Camillus de Lellis", title:"Priest", type:"reflection", text:"A reformed gambler and former soldier who, after his own hospital stay revealed how badly patients were treated, founded an order of priests dedicated to nursing the sick and dying.", wiki:"Camillus_de_Lellis", born:"1550", bio:"His followers were among the first to wear a red cross on their habits, centuries before the founding of the Red Cross. Patron of nurses and hospitals." },
  "07-15": { name:"Bonaventure", title:"Bishop and Doctor of the Church", type:"reflection", text:"As Minister General of the Franciscans, he reconciled the order's competing factions after Francis's death and became one of the era's leading theologians.", wiki:"Bonaventure", born:"1221", bio:"A close friend of Thomas Aquinas, he combined Franciscan spirituality with rigorous philosophy." },
  "07-16": { name:"Our Lady of Mount Carmel", title:"Optional Memorial", type:"reflection", text:"Honors Mary under her Carmelite title, tied to a tradition that she gave the Carmelite order a sacred scapular as a sign of her protection.", wiki:null, bio:"The devotion is especially associated with the Carmelite order, founded by hermits on Mount Carmel in the Holy Land in the 12th century." },
  "07-20": { name:"Apollinaris", title:"Optional Memorial", type:"reflection", text:"Traditionally the first bishop of Ravenna, consecrated by St. Peter himself according to legend, and martyred for his preaching after surviving multiple earlier attempts to kill him.", wiki:"Apollinaris_of_Ravenna", born:"1st century", bio:"His relics are housed beneath the famous Basilica of Sant'Apollinare in Classe, decorated with some of the finest Byzantine mosaics in Italy." },
  "07-21": { name:"Lawrence of Brindisi", title:"Priest and Doctor of the Church", type:"reflection", text:"A Capuchin friar fluent in numerous languages who personally led imperial troops into battle against the Ottomans, carrying only a crucifix while urging soldiers forward.", wiki:"Lawrence_of_Brindisi", born:"1559", bio:"Also a noted diplomat and preacher, he helped negotiate peace agreements between European rulers." },
  "07-23": { name:"Bridget", title:"Religious", type:"reflection", text:"A Swedish noblewoman and mother of eight who, after her husband's death, founded a religious order and traveled to Rome to call for Church reform and the papacy's return from Avignon.", wiki:"Bridget_of_Sweden", born:"1303", bio:"Her visions and writings made her one of medieval Europe's most influential laywomen; she's a patron saint of Europe." },
  "07-24": { name:"Sharbel Makhluf", title:"Priest", type:"reflection", text:"A Lebanese Maronite hermit-monk known for an austere, largely silent life of prayer in a remote mountain monastery.", wiki:"Sharbel_Makhluf", born:"1828", bio:"After his death, reports of miraculous light and healings at his tomb made him one of the most popular saints in the Middle East." },
  "07-25": { name:"James", title:"Apostle", type:"reflection", text:"One of the inner circle of three apostles closest to Jesus, traditionally believed to have preached in Spain before becoming the first apostle martyred, per Acts 12:2.", wiki:"James,_son_of_Zebedee", born:"1st century", bio:"His traditional burial site at Santiago de Compostela became one of medieval Christendom's three great pilgrimage destinations, alongside Rome and Jerusalem." },
  "07-26": { name:"Joachim and Anne", title:"Memorial", type:"reflection", text:"Named in early Christian tradition (not the Bible itself) as the parents of Mary, reflecting the Church's instinct to honor the family that raised the mother of Jesus.", wiki:"Saint_Anne", bio:"Devotion to Anne in particular grew widely in the Middle Ages; she's a patron of mothers, grandmothers, and homemakers." },
  "07-29": { name:"Martha, Mary and Lazarus", title:"Memorial", type:"quote", text:"Lord, if you had been here, my brother would not have died.", source:"Martha to Jesus, John 11:21", wiki:"Lazarus_of_Bethany", born:"1st century", bio:"Siblings from Bethany whose home Jesus regularly visited; Lazarus's raising from death in John's Gospel is one of Jesus's most dramatic recorded miracles." },
  "07-30": { name:"Peter Chrysologus", title:"Bishop and Doctor of the Church", type:"reflection", text:"Known as 'Chrysologus' — golden-worded — for sermons so concise and vivid that fragments of them survive as some of the best-preserved preaching from the early Church.", wiki:"Peter_Chrysologus", born:"c. 380", bio:"Bishop of Ravenna, his surviving homilies remain valued for their clarity in an era of often dense theological writing." },
  "08-01": { name:"Alphonsus Liguori", title:"Bishop and Doctor of the Church", type:"quote", text:"He who prays is certainly saved; he who does not pray is certainly damned.", wiki:"Alphonsus_Liguori", born:"1696", bio:"A former lawyer who, after losing his first major case, turned to the priesthood and founded the Redemptorists, writing extensively on moral theology to help ordinary confessors." },
  "08-02": { name:"Eusebius of Vercelli", title:"Bishop", type:"reflection", text:"An early bishop exiled for years by an Arian emperor for refusing to condemn his fellow orthodox bishop Athanasius.", wiki:"Eusebius_of_Vercelli", born:"c. 283", bio:"Considered the first bishop in the West to combine monastic community life with the secular clergy, a model later widely imitated.", companions:"Shared today with St. Peter Julian Eymard, a 19th-century French priest who founded religious congregations centered on devotion to the Eucharist." },
  "08-05": { name:"The Dedication of the Basilica of Saint Mary Major", title:"Optional Memorial", type:"reflection", text:"Commemorates Rome's largest Marian church, founded in the 5th century after, by legend, an August snowfall on the Esquiline Hill marked the spot Mary wished it built.", wiki:"Santa_Maria_Maggiore", bio:"The basilica's mosaics are among the oldest surviving large-scale Christian artworks in Rome." },
  "08-06": { name:"The Transfiguration of the Lord", title:"Feast", type:"quote", text:"This is my Son, the Beloved; listen to him.", source:"Matthew 17:5", wiki:null, bio:"Recalls the moment Peter, James, and John saw Jesus transfigured in radiant light on a mountain, accompanied by Moses and Elijah." },
  "08-07": { name:"Sixtus II and Companions", title:"Martyrs", type:"reflection", text:"A pope beheaded with several deacons in 258 while celebrating Mass in the catacombs during a renewed Roman persecution.", wiki:"Pope_Sixtus_II", bio:"His martyrdom is commemorated in the Roman Canon of the Mass alongside the earliest popes.", companions:"Shared today with St. Cajetan, an Italian priest who co-founded a religious order and pioneered charitable pawnshops to protect the poor from loan sharks." },
  "08-08": { name:"Dominic", title:"Priest", type:"quote", text:"Have charity, guard humility, and possess voluntary poverty.", source:"his deathbed counsel to the friars, 1221", wiki:"Dominic_de_Guzmán", born:"1170", bio:"A Spanish priest who founded the Dominican order to combat heresy through preaching grounded in study, concluding that persuasion, not force, would win back heretics." },
  "08-10": { name:"Lawrence", title:"Deacon and Martyr", type:"quote", text:"Turn me over; I'm done on this side.", source:"traditionally attributed, said from the gridiron", wiki:"Lawrence_of_Rome", bio:"A deacon martyred in Rome in 258, his cheerful defiance even under torture made him one of the most popular martyrs of the early Church." },
  "08-12": { name:"Jane Frances de Chantal", title:"Religious", type:"reflection", text:"A French widow and mother of four who, guided by St. Francis de Sales, founded the Visitation Order for women not strong enough for the era's strict cloistered orders.", wiki:"Jane_Frances_de_Chantal", born:"1572", bio:"She balanced raising her children with religious life, later seeing two of her grandchildren also become notable figures in French history." },
  "08-13": { name:"Pontian and Hippolytus", title:"Martyrs", type:"reflection", text:"A pope and a rival theologian who had once opposed each other so fiercely that Hippolytus was considered an antipope — until both were exiled together to the same Sardinian mines, where they reconciled before dying.", wiki:"Hippolytus_of_Rome", bio:"Their reconciliation in shared suffering is remembered as a powerful image of unity restored.", companions:"Shared today with St. Maximus the Confessor, a Byzantine monk who had his tongue and right hand cut off for refusing to compromise on the doctrine of Christ's two wills." },
  "08-16": { name:"Stephen of Hungary", title:"Optional Memorial", type:"reflection", text:"Hungary's first Christian king, crowned with a crown reputedly sent by the pope, who built churches and monasteries across the kingdom and organized its diocesan structure.", wiki:"Stephen_I_of_Hungary", born:"c. 975", bio:"Considered the founder of the Hungarian state as a Christian nation; his right hand is preserved as a relic in Budapest's St. Stephen's Basilica." },
  "08-19": { name:"John Eudes", title:"Priest", type:"reflection", text:"A French priest who, after years as a popular missionary preacher, founded congregations dedicated to better priestly formation and to helping women leave prostitution.", wiki:"John_Eudes", born:"1601", bio:"He helped popularize devotion to the Sacred Heart of Jesus and the Heart of Mary, decades before it became widespread." },
  "08-20": { name:"Bernard", title:"Abbot and Doctor of the Church", type:"reflection", text:"A Cistercian abbot whose preaching tours and letters made him the most influential churchman of his era, advising five popes and helping settle a papal schism.", wiki:"Bernard_of_Clairvaux", born:"1090", bio:"Founder of the Clairvaux monastery, he was a major force behind the rapid expansion of the Cistercian reform across Europe." },
  "08-21": { name:"Pius X", title:"Pope", type:"quote", text:"To restore all things in Christ.", source:"his papal motto, from Ephesians 1:10", wiki:"Pope_Pius_X", born:"1835", bio:"A pope of humble peasant origin, he lowered the age for First Communion and resisted theological modernism, later canonized for his personal simplicity and pastoral focus." },
  "08-22": { name:"The Queenship of the Blessed Virgin Mary", title:"Memorial", type:"reflection", text:"Established in 1954 by Pope Pius XII, eight days after the Assumption, to honor Mary's traditional title as Queen of Heaven.", wiki:null, bio:"The feast deliberately follows the Assumption, reflecting the belief that Mary's heavenly queenship flows from her unique role as mother of Christ the King." },
  "08-23": { name:"Rose of Lima", title:"Virgin", type:"reflection", text:"The first person born in the Americas to be canonized, she practiced extreme penances and cared for the sick and poor of colonial Lima from a small hut in her family's garden.", wiki:"Rose_of_Lima", born:"1586", bio:"Patroness of Peru and all of Latin America, her feast became an early symbol of the New World's own claim to sanctity, independent of Europe." },
  "08-24": { name:"Bartholomew", title:"Apostle", type:"reflection", text:"Likely identical to Nathanael, whom Jesus called 'an Israelite in whom there is no deceit' in John's Gospel; tradition holds he was flayed alive while preaching in Armenia.", wiki:"Bartholomew_the_Apostle", born:"1st century", bio:"His gruesome traditional martyrdom made him a popular subject in Renaissance art, including Michelangelo's self-portrait painted onto Bartholomew's flayed skin in the Sistine Chapel." },
  "08-25": { name:"Louis", title:"Optional Memorial", type:"reflection", text:"A French king who personally administered justice under an oak tree to ensure ordinary subjects had access to him, and who led two Crusades, dying of dysentery during the second.", wiki:"Louis_IX_of_France", born:"1214", bio:"Widely regarded as the medieval ideal of a just Christian ruler, he's the only French king ever canonized.", companions:"Shared today with St. Joseph Calasanz, who founded Europe's first free public schools for poor children in 16th-century Rome." },
  "08-27": { name:"Monica", title:"Memorial", type:"quote", text:"Lay this body anywhere; only do not let it be far from your mind.", source:"her dying words, recorded by her son Augustine in his Confessions", wiki:"Monica_of_Hippo", born:"331", bio:"Mother of St. Augustine, she prayed and wept for her wayward son's conversion for nearly two decades before finally seeing it happen, just months before her own death." },
  "08-29": { name:"The Passion of Saint John the Baptist", title:"Memorial", type:"reflection", text:"Commemorates John the Baptist's beheading at the order of King Herod Antipas, after Herod's stepdaughter requested his head as a reward for her dancing.", wiki:"John_the_Baptist", bio:"His death is recounted in Mark 6 and Matthew 14 as the price of John's public condemnation of Herod's unlawful marriage." },
  "09-05": { name:"Teresa of Calcutta", title:"Religious", type:"quote", text:"We can do no great things, only small things with great love.", wiki:"Mother_Teresa", born:"1910", bio:"An Albanian-born nun who spent nearly five decades serving the poorest of the poor in Kolkata, India, founding the Missionaries of Charity and winning the Nobel Peace Prize in 1979." },
  "09-08": { name:"The Nativity of the Blessed Virgin Mary", title:"Feast", type:"reflection", text:"Celebrates Mary's birth, a date not recorded in Scripture but observed since at least the 6th century, traditionally nine months after the Immaculate Conception feast on December 8.", wiki:"Nativity_of_Mary", bio:"Early Christian tradition, drawn from non-biblical writings, names her parents as Joachim and Anne." },
  "09-09": { name:"Peter Claver", title:"Priest", type:"quote", text:"The slave of the slaves, forever.", source:"how he described himself", wiki:"Peter_Claver", born:"1580", bio:"A Spanish Jesuit who spent over 40 years in Cartagena, Colombia, ministering to enslaved Africans as they arrived by the thousands, baptizing and caring for an estimated 300,000 people." },
  "09-12": { name:"The Most Holy Name of Mary", title:"Optional Memorial", type:"reflection", text:"Honors the name 'Mary,' added to the General Roman Calendar to commemorate a 1683 military victory at Vienna attributed to her intercession.", wiki:null, bio:"The feast pairs thematically with the Holy Name of Jesus, celebrated each January." },
  "09-13": { name:"John Chrysostom", title:"Bishop and Doctor of the Church", type:"reflection", text:"Exiled twice by the imperial court of Constantinople for publicly criticizing the excesses of the wealthy and the empress herself, he died from the harsh conditions of his final exile march.", wiki:"John_Chrysostom", born:"c. 347", bio:"Patriarch of Constantinople, his nickname 'Chrysostom' — golden-mouthed — reflects his renown as the greatest preacher of the early Eastern Church." },
  "09-14": { name:"The Exaltation of the Holy Cross", title:"Feast", type:"reflection", text:"Commemorates the 4th-century discovery of the True Cross by St. Helena, mother of Emperor Constantine, in Jerusalem, and its later recovery after a Persian invasion.", wiki:null, bio:"One of the oldest feasts on the calendar, it shifts the Church's symbol of the cross from instrument of execution to sign of victory." },
  "09-15": { name:"Our Lady of Sorrows", title:"Memorial", type:"quote", text:"And a sword will pierce your soul.", source:"Simeon's prophecy to Mary, Luke 2:35", wiki:null, bio:"Honors Mary's suffering throughout Christ's life, traditionally enumerated as the Seven Sorrows, from Simeon's prophecy to standing at the foot of the cross." },
  "09-16": { name:"Cornelius and Cyprian", title:"Martyrs", type:"reflection", text:"A pope and a North African bishop who corresponded and allied against a movement that wanted to permanently exclude Christians who had lapsed under persecution; both were later martyred themselves.", wiki:"Cyprian", bio:"Cyprian's writings on church unity and Cornelius's brief, contested papacy both played out against the backdrop of recurring Roman persecution." },
  "09-17": { name:"Robert Bellarmine", title:"Bishop and Doctor of the Church", type:"reflection", text:"A Jesuit cardinal and theologian who served on the commission that investigated Galileo, while also writing influential catechisms still used centuries later.", wiki:"Robert_Bellarmine", born:"1542", bio:"His careful, methodical defenses of Catholic doctrine made him one of the Counter-Reformation's most respected theologians.", companions:"Shared today with St. Hildegard of Bingen, a German Benedictine abbess, composer, and visionary whose writings on theology, medicine, and natural science were extraordinary for a 12th-century woman." },
  "09-19": { name:"Januarius", title:"Bishop and Martyr", type:"reflection", text:"A bishop martyred in Italy around 305, whose dried blood, kept in a vial in Naples, is reported to liquefy on his feast day — a phenomenon investigated but never definitively explained.", wiki:"Januarius", bio:"The annual 'miracle of San Gennaro' remains one of the most famous unexplained Catholic relics, drawing crowds to Naples Cathedral each September." },
  "09-20": { name:"Andrew Kim Tae-gon and Companions", title:"Martyrs", type:"reflection", text:"Korea's first native-born priest, ordained in secret, who was tortured and beheaded in 1846 at age twenty-five, just over a year into his ministry.", wiki:"Andrew_Kim_Taegŏn", born:"1821", bio:"Honored alongside lay catechist Paul Chong Ha-sang and over a hundred other Korean martyrs killed across the 19th century, a period when Catholicism was banned outright in Korea." },
  "09-21": { name:"Matthew", title:"Apostle and Evangelist", type:"reflection", text:"A tax collector for the Roman occupation — one of the most despised professions among Jews of his time — who left his post the moment Jesus said 'Follow me.'", wiki:"Matthew_the_Apostle", born:"1st century", bio:"Traditionally credited with writing the first Gospel, which presents Jesus's teaching with a particular eye to fulfillment of Hebrew prophecy." },
  "09-23": { name:"Pius of Pietrelcina", title:"Priest", type:"quote", text:"Pray, hope, and don't worry.", wiki:"Padre_Pio", born:"1887", bio:"An Italian Capuchin friar known as Padre Pio, who reportedly bore the wounds of Christ's stigmata for fifty years and spent up to 19 hours a day hearing confessions." },
  "09-26": { name:"Cosmas and Damian", title:"Optional Memorial", type:"reflection", text:"Twin brothers and physicians in Roman Syria who treated patients for free before being martyred under Diocletian.", wiki:"Cosmas_and_Damian", bio:"Patrons of physicians and surgeons, their cult was so popular that several early popes built churches in their honor in Rome and Constantinople." },
  "09-28": { name:"Wenceslaus", title:"Martyr", type:"reflection", text:"A 10th-century Duke of Bohemia murdered by his own brother in a succession dispute, remembered for his piety and care for the poor — the same figure behind the carol 'Good King Wenceslas.'", wiki:"Wenceslaus_I,_Duke_of_Bohemia", born:"c. 907", bio:"Patron saint of the Czech state, his death made him an early symbol of Bohemian Christian identity.", companions:"Shared today with St. Lawrence Ruiz, a Filipino layman martyred in Japan in 1637 — the first Filipino saint." },
  "09-29": { name:"Michael, Gabriel, and Raphael", title:"Archangels", type:"quote", text:"Hail, favored one! The Lord is with you.", source:"the Angel Gabriel to Mary, Luke 1:28", wiki:"Archangel", bio:"The only three angels named in the Bible: Michael the warrior-protector, Gabriel the divine messenger, and Raphael the healer of the Book of Tobit." },
  "10-02": { name:"The Holy Guardian Angels", title:"Memorial", type:"reflection", text:"Reflects the long-standing Christian belief, rooted in passages like Psalm 91 and Matthew 18:10, that each person is accompanied by a guardian angel throughout life.", wiki:null, bio:"Devotion to guardian angels became especially popular in the Middle Ages and remains a staple of children's religious education today." },
  "10-05": { name:"Faustina Kowalska", title:"Virgin", type:"quote", text:"Jesus, I trust in You.", wiki:"Faustina_Kowalska", born:"1905", bio:"A Polish nun whose reported visions of Jesus as the 'Divine Mercy' inspired a devotion that fellow Pole Pope John Paul II later spread worldwide, including establishing Divine Mercy Sunday." },
  "10-06": { name:"Bruno", title:"Priest", type:"reflection", text:"A renowned theology teacher who abruptly left a promising academic career to live as a hermit in the French Alps, founding the famously austere and silent Carthusian order.", wiki:"Bruno_of_Cologne", born:"c. 1030", bio:"Carthusian monks still follow a rule of near-total silence and solitude inspired by his original community at the Grande Chartreuse — also the origin of the liqueur's name." },
  "10-07": { name:"Our Lady of the Rosary", title:"Memorial", type:"reflection", text:"Established to commemorate a 1571 naval victory at the Battle of Lepanto, credited by Pope Pius V to Christians praying the Rosary across Europe that day.", wiki:null, bio:"The Rosary itself, a repeated cycle of prayers on events in the lives of Jesus and Mary, is traditionally associated with St. Dominic, though its present form developed gradually over centuries." },
  "10-09": { name:"Denis and Companions", title:"Martyrs", type:"reflection", text:"The legendary first bishop of Paris, beheaded around 250 — according to later legend, he then picked up his own severed head and walked some distance while preaching.", wiki:"Saint_Denis", bio:"Patron saint of France, the Paris suburb of Saint-Denis and its royal abbey are named for him.", companions:"Shared today with St. John Leonardi, an Italian priest-reformer, and St. John Henry Newman, the 19th-century English convert and theologian canonized in 2019." },
  "10-11": { name:"John XXIII", title:"Pope", type:"quote", text:"I want to throw open the windows of the Church so that we can see out and the people can see in.", source:"said of his reasons for convening the Second Vatican Council", wiki:"Pope_John_XXIII", born:"1881", bio:"An Italian pope elected at 76 as a presumed caretaker, he instead called the Second Vatican Council, one of the most transformative events in modern Catholic history." },
  "10-14": { name:"Callistus I", title:"Pope and Martyr", type:"reflection", text:"A former slave who became pope around 217, controversially extending forgiveness and re-admission to Christians who had committed serious sins.", wiki:"Pope_Callixtus_I", bio:"He was reportedly martyred during a local Roman riot, his body thrown down a well." },
  "10-16": { name:"Hedwig", title:"Religious", type:"reflection", text:"A German duchess who, widowed after raising seven children, gave away her wealth and retired to a convent she had founded, living out her final years in voluntary poverty.", wiki:"Hedwig_of_Silesia", born:"1174", bio:"Patroness of Silesia, she's remembered for personally tending lepers despite her royal status.", companions:"Shared today with St. Margaret Mary Alacoque, a French nun whose 17th-century visions of Christ's Sacred Heart launched the devotion now marked worldwide each June." },
