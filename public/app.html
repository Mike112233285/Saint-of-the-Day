  "11-06": { name:"Leonard of Noblac", title:"Hermit", type:"reflection", text:"A 6th-century Frankish nobleman who became a hermit near Limoges and, according to his legend, won from King Clovis the gift of freeing any prisoner he visited in the royal jails.", wiki:"Leonard_of_Noblac", born:"c. 500", bio:"Patron of captives, prisoners, and women in childbirth, his cult became immensely popular after returning Crusaders promoted him as the saint who had freed Christian prisoners in the Holy Land." },
  "11-07": { name:"Willibrord of Utrecht", title:"Bishop", type:"reflection", text:"An English monk trained in Ireland who became the 'Apostle of the Frisians,' establishing the first archdiocese in what is now the Netherlands.", wiki:"Willibrord", born:"658", bio:"He founded the Abbey of Echternach in Luxembourg, still the site of a unique 'dancing procession' held on his feast day each year." },
  "11-08": { name:"The Four Crowned Martyrs", title:"Martyrs", type:"reflection", text:"Four soldiers — or possibly four stonemasons — martyred under Diocletian for refusing either to make an idol or sacrifice to pagan gods; two overlapping groups whose stories merged in their combined feast.", wiki:"Four_Crowned_Martyrs", bio:"Their patronage of stonemasons was deeply embedded in medieval guild life, and Freemasonry later adopted them as its symbolic patron saints." },
  "11-13": { name:"Frances Xavier Cabrini", title:"Religious", type:"reflection", text:"An Italian nun who founded the Missionary Sisters of the Sacred Heart and emigrated to the United States, where she spent decades building orphanages, schools, and hospitals for the waves of Italian immigrants.", wiki:"Frances_Xavier_Cabrini", born:"1850", bio:"The first American citizen to be canonised, her organisation eventually ran over 70 institutions across the Americas, Europe, and beyond." },
  "11-14": { name:"Laurence O'Toole", title:"Bishop", type:"reflection", text:"Archbishop of Dublin during the Norman invasion of Ireland who worked tirelessly to protect his city's population, negotiating between Irish kings and the Normans, and died in Normandy while pursuing his final diplomatic mission.", wiki:"Laurence_O'Toole", born:"c. 1128", bio:"Patron saint of Dublin, he was canonised in 1225; his heart is preserved as a relic in Dublin's Christ Church Cathedral." },
  "11-19": { name:"Mechthild of Hackeborn", title:"Virgin", type:"reflection", text:"A German Benedictine nun and mystic whose visions of Christ's Sacred Heart, recorded in The Book of Special Grace, influenced the Sacred Heart devotion later formalised through Margaret Mary Alacoque.", wiki:"Mechtild_of_Hackeborn", born:"1241", bio:"A gifted musician and teacher, she was called 'God's nightingale' by her community at the Helfta monastery, one of the great centres of female mysticism in medieval Germany." },
  "11-20": { name:"Edmund the Martyr", title:"King and Martyr", type:"reflection", text:"King of East Anglia who was captured by Viking Great Army invaders in 869, offered terms that would make him a vassal, and refused — so was bound to a tree and shot through with arrows.", wiki:"Edmund_the_Martyr", born:"c. 841", bio:"His shrine at Bury St Edmunds became one of the richest and most visited in medieval England; the town and Suffolk's great abbey are named for him." },
  "11-26": { name:"Sylvester Gozzolini", title:"Abbot", type:"reflection", text:"A 13th-century Italian canon lawyer who abandoned a cathedral post to become a hermit after a vision of a decomposing corpse prompted him to reconsider his comfortable life.", wiki:"Sylvester_Gozzolini", born:"1177", bio:"He founded the Silvestrine Benedictines, who follow the original Rule of Benedict with few later modifications." },
  "11-27": { name:"Virgil of Salzburg", title:"Bishop", type:"reflection", text:"An Irish monk who became Bishop of Salzburg and asserted, against criticism from St Boniface, that the Earth was spherical and that human beings lived on its other side — a remarkably early and correct insistence.", wiki:"Vergilius_of_Salzburg", born:"c. 700", bio:"He evangelised Carinthia and founded Salzburg Cathedral; his intellectual defence of the spherical earth makes him a patron saint of scientists in some traditions." },
  "11-28": { name:"Catherine Labouré", title:"Virgin", type:"reflection", text:"A French Daughter of Charity who reported a series of visions in 1830 in which Mary showed her the design of the Miraculous Medal, now worn by hundreds of millions of Catholics worldwide.", wiki:"Catherine_Labouré", born:"1806", bio:"She kept her visions secret for forty-six years, continuing as a humble laundress in the Daughters of Charity hospice until shortly before her death." },
  "11-29": { name:"Saturninus of Toulouse", title:"Bishop and Martyr", type:"reflection", text:"Traditionally the first bishop of Toulouse, martyred around 250 when he was tied to a bull by a pagan crowd and dragged to death through the streets.", wiki:"Saturnin_of_Toulouse", bio:"The Basilica of Saint-Sernin in Toulouse, one of the most magnificent Romanesque churches in Europe, was built over the site of his veneration and remains a stop on the Camino de Santiago." },
  "12-01": { name:"Eligius of Noyon", title:"Bishop", type:"reflection", text:"A master goldsmith and royal treasurer who became bishop and used his enormous personal wealth to buy and free slaves, ultimately becoming patron of goldsmiths and metalworkers.", wiki:"Eligius", born:"c. 590", bio:"His feast was one of the most popular among medieval craftspeople; the 'Prioress's Tale' in Chaucer and Maupassant's 'Boule de Suif' both obliquely reference his cultural prominence." },
  "12-02": { name:"Bibiana of Rome", title:"Martyr", type:"reflection", text:"A Roman martyr, daughter of two Christian parents also martyred under Julian the Apostate, who was executed around 363 after being scourged to death rather than deny her faith.", wiki:"Viviana", bio:"The 5th-century church built over her reputed burial site near the Esquiline Hill survives in Rome; Gian Lorenzo Bernini carved a famous marble statue of her there." },
  "12-05": { name:"Sabbas the Sanctified", title:"Abbot", type:"reflection", text:"A Cappadocian monk who founded the Great Lavra monastery in the Judean desert — still inhabited by Orthodox monks today, making it the oldest continuously occupied monastery in the world.", wiki:"Sabbas_the_Sanctified", born:"439", bio:"The Mar Saba monastery perched on a cliff above the Kidron Valley has sheltered monks without interruption since 483 AD and remains a major site of Eastern Christian monasticism." },
  "12-15": { name:"Nino of Georgia", title:"Missionary", type:"reflection", text:"A female slave who brought Christianity to the Kingdom of Iberia (Georgia) in the 4th century, healing the queen and converting the king through her prayers and example.", wiki:"Nino", born:"c. 296", bio:"Called 'Equal to the Apostles' by the Georgian Church, she is credited with evangelising what is now Georgia — one of the oldest Christian nations. Her distinctive cross, with drooping arms, is the national symbol." },
  "12-16": { name:"Adelaide of Italy", title:"Empress", type:"reflection", text:"A Burgundian princess who, after her first husband's murder and months of imprisonment by his successor, was freed by Otto I, married him, and became Holy Roman Empress — using her position for extensive charity.", wiki:"Adelaide_of_Italy", born:"931", bio:"She outlived her second husband by decades, serving as regent, endowing monasteries, and protecting the poor until her death at sixty-eight." },
  "12-17": { name:"Olympias of Constantinople", title:"Deaconess", type:"reflection", text:"A wealthy Byzantine noblewoman ordained as a deaconess who became one of the most important patrons of the early Church in Constantinople, and a close friend and correspondent of John Chrysostom.", wiki:"Olympias_of_Constantinople", born:"c. 361", bio:"When Chrysostom was exiled, she remained in contact with him by letter; seventeen of his letters to her survive, among the most moving personal correspondence in patristic literature." },
  "12-18": { name:"Flannan of Killaloe", title:"Bishop", type:"reflection", text:"An Irish bishop and pilgrim of the 7th century, son of a king, who made a pilgrimage to Rome and is patron of Killaloe and its diocese in County Clare.", wiki:null, born:"7th century", bio:"The remote Flannan Isles off Scotland, site of the famous unsolved mystery of three lighthouse keepers who disappeared without trace in 1900, bear his name." },
  "12-19": { name:"Anastasius I", title:"Pope", type:"reflection", text:"A late 4th-century pope of considerable personal holiness whose three-year pontificate included difficult correspondence with Augustine of Hippo over the writings of Origen.", wiki:"Pope_Anastasius_I", bio:"He died in 401, and Jerome remarked on how quickly Rome had lost such a great bishop — a rare moment of praise from the habitually critical scholar." },
  "12-20": { name:"Dominic of Silos", title:"Abbot", type:"reflection", text:"A Spanish Benedictine abbot who rebuilt and reformed the monastery of Santo Domingo de Silos, which became famous for its magnificent Romanesque cloister and its modern-day Gregorian chant recordings.", wiki:"Dominic_of_Silos", born:"c. 1000", bio:"His monastery became a sanctuary for Mozarabic Christians escaping Muslim rule and a centre for ransoming Christian captives, a work he pursued tirelessly." },
  "12-22": { name:"Chaeremon and Companions", title:"Martyrs", type:"reflection", text:"An elderly Bishop of Nilópolis in Egypt who fled into the Arabian desert with companions to escape the Decian persecution of 250, and was never seen again.", wiki:null, bio:"His disappearance was reported by Dionysius of Alexandria, who wrote movingly of the many Egyptian Christians who vanished or died in the desert rather than apostatise." },
  "12-24": { name:"Christmas Eve", title:"Vigil of the Nativity", type:"quote", text:"Do not be afraid; for behold, I proclaim to you good news of great joy that will be for all the people.", source:"Luke 2:10", wiki:null, bio:"The night before Christmas has been marked by special liturgical celebration since at least the 4th century; the tradition of Midnight Mass — now often celebrated at an earlier hour — draws its power from the ancient instinct to welcome the light in darkness." },
  "12-25": { name:"The Nativity of the Lord", title:"Solemnity", type:"quote", text:"The Word became flesh and made his dwelling among us.", source:"John 1:14", wiki:null, bio:"Christmas, the celebration of Christ's birth, has been observed on December 25 since at least the 4th century; it remains the most widely celebrated religious and cultural feast in the world." },
  "12-30": { name:"Anysia of Thessalonica", title:"Martyr", type:"reflection", text:"A young noblewoman of Thessalonica martyred around 304 who, when stopped by a Roman soldier demanding to know if she was Christian, gave him her answer — and was killed on the spot.", wiki:"Anysia_of_Thessalonica", bio:"She gave away her inherited wealth to the poor before her martyrdom and is venerated in both Eastern and Western martyrologies." },
};

const FALLBACK = {
  title:"Known only to God",
  text:"This day's saint hasn't been added to the calendar yet. The roll call of holiness is far larger than any list — countless faithful lives are remembered by God alone."
};

const weekdayFmt = new Intl.DateTimeFormat('en-US', { weekday:'long' });
const monthDayFmt = new Intl.DateTimeFormat('en-US', { month:'short', day:'numeric' });

let current = new Date();
current.setHours(0,0,0,0);
const imageCache = {};

function keyFor(date){
  const mm = String(date.getMonth()+1).padStart(2,'0');
  const dd = String(date.getDate()).padStart(2,'0');
  return `${mm}-${dd}`;
}

async function fetchPortrait(wikiTitle){
  if (!wikiTitle) return null;
  if (imageCache[wikiTitle] !== undefined) return imageCache[wikiTitle];
  try{
    const res = await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(wikiTitle)}`);
    if (!res.ok) throw new Error('not ok');
    const data = await res.json();
    const url = data.thumbnail && data.thumbnail.source ? data.thumbnail.source : null;
    imageCache[wikiTitle] = url;
    return url;
  }catch(e){
    imageCache[wikiTitle] = null;
    return null;
  }
}

// Returns the display-ready name with appropriate prefix.
// Rules:
//   • Feast days, mysteries, Marian titles, observances → no prefix
//   • "[Name] and Companions" → "Saint [Name] and Companions"
//   • Multiple named saints joined by "and" / "&" → "Saints …"
//   • "Sts …" → "Saints …"
//   • Everything else (single person) → "Saint …"
function withSaintPrefix(name){
  // Feast days, mysteries, observances — no prefix
  if (/^(The |Our Lady|All Saints$|All Souls$|All Hallows|Beginning of|Christmas Eve)/.test(name)) return name;
  if (/^(Seven Founders|Seven Brothers|Four Crowned)/.test(name)) return name;

  // Legacy "Sts " prefix → normalise to "Saints "
  if (/^Sts /.test(name)) return 'Saints ' + name.slice(4);

  // "[Named saint(s)] and Companions" — primary name takes singular "Saint"
  if (/ and Companions/.test(name)) return 'Saint ' + name;

  // Multiple individually-named saints ("and" / "&")
  if (/ and | & /.test(name)) return 'Saints ' + name;

  // Single person
  return 'Saint ' + name;
}

// Generation counter — each render() call gets a unique ID.
// Portrait fetches check this before writing to DOM so a slow network response
// for a previous day cannot overwrite current day content.
let renderGen = 0;

function renderSync(date){
  const key = keyFor(date);
  const entry = SAINTS[key];

  document.getElementById('weekday').textContent = weekdayFmt.format(date);
  document.getElementById('bigDate').textContent = monthDayFmt.format(date);

  const nameEl     = document.getElementById('saintName');
  const titleEl    = document.getElementById('saintTitle');
  const bornEl     = document.getElementById('saintBorn');
  const quoteBlock = document.getElementById('quoteBlock');
  const bioBlock   = document.getElementById('bioBlock');
  const medallion  = document.getElementById('medallion');

  if (entry) {
    var displayName = withSaintPrefix(entry.name);
    nameEl.textContent  = displayName;
    titleEl.textContent = entry.title || '';
    bornEl.textContent  = entry.born ? 'Born ' + entry.born : '';

    var companionHtml = entry.companions
      ? '<p class="companion-note">' + entry.companions + '</p>' : '';

    if (entry.type === 'quote') {
      quoteBlock.innerHTML =
        '<span class="quote-mark">\u201c</span>' +
        '<p class="quote-text">' + entry.text + '</p>' +
        '<p class="attribution">\u2014 ' + displayName + '</p>' +
        (entry.source ? '<p class="source-note">' + entry.source + '</p>' : '') +
        companionHtml;
    } else {
      quoteBlock.innerHTML =
        '<p class="reflection-text">' + entry.text + '</p>' +
        '<p class="attribution">\u2014 remembered today</p>' +
        companionHtml;
    }

    bioBlock.innerHTML = entry.bio
      ? '<p class="bio-text">' + entry.bio + '</p>' : '';

    medallion.innerHTML =
      '<span class="fallback-initial">' + entry.name.charAt(0) + '</span>';

    var myGen = ++renderGen;
    if (entry.wiki) {
      fetchPortrait(entry.wiki).then(function(url){
        if (renderGen !== myGen) return;
        if (url) {
          document.getElementById('medallion').innerHTML =
            '<img src="' + url + '" alt="Portrait of ' + displayName + '">';
        }
      });
    }
  } else {
    nameEl.textContent   = FALLBACK.title;
    titleEl.textContent  = '';
    bornEl.textContent   = '';
    quoteBlock.innerHTML = '<p class="reflection-text">' + FALLBACK.text + '</p>';
    bioBlock.innerHTML   = '';
    medallion.innerHTML  = '<span class="fallback-initial">\u271a</span>';
  }
}

function render(date, animate){
  var card = document.getElementById('card');
  if (animate) {
    card.classList.add('turning');
    setTimeout(function(){ card.classList.remove('turning'); }, 640);
  }
  renderSync(date);
}

function syncJumpInput(){
  var m = current.getMonth();
  var d = current.getDate();
  document.getElementById('jumpMonth').value = m;
  populateDays(m, d);
}

function shiftDay(n){
  current.setDate(current.getDate() + n);
  render(current, true);
  syncJumpInput();
}

document.getElementById('prevBtn').addEventListener('click', function(){ shiftDay(-1); });
document.getElementById('nextBtn').addEventListener('click', function(){ shiftDay(1); });
document.getElementById('todayBtn').addEventListener('click', function(){
  current = new Date();
  current.setHours(0,0,0,0);
  render(current, true);
  syncJumpInput();
});
document.getElementById('jumpMonth').addEventListener('change', function(){
  current.setMonth(parseInt(this.value));
  var maxDay = new Date(current.getFullYear(), current.getMonth()+1, 0).getDate();
  if (current.getDate() > maxDay) current.setDate(maxDay);
  populateDays(current.getMonth(), current.getDate());
  render(current, true);
});
document.getElementById('jumpDay').addEventListener('change', function(){
  current.setDate(parseInt(this.value));
  render(current, true);
  syncJumpInput();
});

// Populate the day select (1-31) and keep it in sync when month changes
function populateDays(month, selectedDay){
  var sel = document.getElementById('jumpDay');
  var maxDay = new Date(current.getFullYear(), month+1, 0).getDate();
  sel.innerHTML = '';
  for (var i=1; i<=maxDay; i++){
    var opt = document.createElement('option');
    opt.value = i;
    opt.textContent = i;
    if (i === selectedDay) opt.selected = true;
    sel.appendChild(opt);
  }
}

syncJumpInput();
render(current, false);
</script>
