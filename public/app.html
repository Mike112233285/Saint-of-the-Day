  "10-17": { name:"Ignatius of Antioch", title:"Bishop and Martyr", type:"quote", text:"I am God's wheat, and I am being ground by the teeth of wild beasts that I may become the pure bread of Christ.", source:"his Letter to the Romans, written en route to his execution", wiki:"Ignatius_of_Antioch", born:"1st century", bio:"Bishop of Antioch and likely a direct disciple of the Apostle John, his seven surviving letters are among Christianity's earliest writings outside the New Testament." },
  "10-18": { name:"Luke", title:"Evangelist", type:"reflection", text:"A Gentile physician and historian who traveled extensively with Paul, writing both a Gospel and the Acts of the Apostles — together the longest portion of the New Testament by any single author.", wiki:"Luke_the_Evangelist", born:"1st century", bio:"Tradition also credits him as an early icon painter; he's patron of physicians, artists, and surgeons." },
  "10-19": { name:"John de Brébeuf, Isaac Jogues and Companions", title:"Martyrs", type:"reflection", text:"French Jesuit missionaries to North America's Huron and Iroquois peoples, several of them tortured to death during conflicts between rival Native nations in the 1640s.", wiki:"Jean_de_Brébeuf", bio:"Known as the North American Martyrs, their missions in present-day Canada and New York State are now major pilgrimage and historical sites.", companions:"Shared today with St. Paul of the Cross, an 18th-century Italian priest who founded the Passionists, focused on devotion to Christ's suffering." },
  "10-23": { name:"John of Capistrano", title:"Priest", type:"reflection", text:"A Franciscan friar and former lawyer who, in his seventies, personally helped rally Christian forces at the 1456 Siege of Belgrade against an Ottoman invasion.", wiki:"John_of_Capistrano", born:"1386", bio:"Known as the 'Soldier Saint' for his battlefield preaching, he died of plague just months after the siege's unlikely victory." },
  "10-24": { name:"Anthony Mary Claret", title:"Bishop", type:"reflection", text:"A Spanish priest and prolific writer who, as Archbishop of Cuba, survived an assassination attempt with a knife slash to the face before later founding the Claretian missionary order.", wiki:"Anthony_Mary_Claret", born:"1807", bio:"He's said to have preached over 25,000 sermons and published more than 200 books and pamphlets in his lifetime." },
  "10-28": { name:"Simon and Jude", title:"Apostles", type:"reflection", text:"Two of the lesser-documented Twelve Apostles, traditionally believed to have been martyred together on a joint mission to Persia.", wiki:"Jude_the_Apostle", born:"1st century", bio:"Jude is widely invoked today as the patron of desperate or hopeless causes, a devotion that grew enormously in the 20th century." },
  "11-04": { name:"Charles Borromeo", title:"Bishop", type:"reflection", text:"As Archbishop of Milan during the plague of 1576, he stayed in the city to personally minister to the sick and dying when many wealthier residents fled.", wiki:"Charles_Borromeo", born:"1538", bio:"A key implementer of the Council of Trent's reforms, he reorganized seminaries and pioneered the systematic religious education now known as Sunday school." },
  "11-09": { name:"The Dedication of the Lateran Basilica", title:"Feast", type:"reflection", text:"Commemorates Rome's cathedral church, the Basilica of St. John Lateran — not St. Peter's — which holds the official seat of the Bishop of Rome, the pope.", wiki:"Lateran_Basilica", bio:"Dedicated in the 4th century under Constantine, it predates St. Peter's Basilica and remains, technically, the highest-ranking church in the Catholic world." },
  "11-10": { name:"Leo the Great", title:"Pope and Doctor of the Church", type:"reflection", text:"Pope during the collapse of Roman authority in the West, he is credited with personally persuading Attila the Hun to turn back from invading Rome in 452.", wiki:"Pope_Leo_I", born:"c. 400", bio:"His Tome on the dual natures of Christ shaped the Council of Chalcedon's defining statement on Christ's divinity and humanity." },
  "11-11": { name:"Martin of Tours", title:"Bishop", type:"reflection", text:"A Roman soldier who, as a young man, cut his military cloak in half to share with a freezing beggar — then dreamed that night that the beggar was Christ himself.", wiki:"Martin_of_Tours", born:"c. 316", bio:"He went on to become a reluctant bishop of Tours, founding one of the West's earliest monasteries; his cloak-sharing became one of medieval Europe's most depicted images of charity." },
  "11-12": { name:"Josaphat", title:"Bishop and Martyr", type:"reflection", text:"A bishop who worked to reunite the Ukrainian Eastern Church with Rome while preserving its own Byzantine traditions, a cause that made him deeply unpopular with opponents of the union.", wiki:"Josaphat_Kuntsevych", born:"1580", bio:"He was murdered by an anti-union mob in Vitebsk in 1623, struck with an axe and thrown into a river." },
  "11-15": { name:"Albert the Great", title:"Bishop and Doctor of the Church", type:"reflection", text:"A Dominican friar and polymath who taught and mentored Thomas Aquinas, writing extensively on subjects ranging from theology to botany, mineralogy, and astronomy.", wiki:"Albertus_Magnus", born:"c. 1200", bio:"Often called the 'Universal Doctor' for the breadth of his learning, he's a patron saint of scientists." },
  "11-16": { name:"Margaret of Scotland", title:"Optional Memorial", type:"reflection", text:"An English-born queen of Scotland who used her position to reform church practices, ransom prisoners, and personally feed orphans each morning before her own breakfast.", wiki:"Margaret_of_Scotland", born:"c. 1045", bio:"Patron saint of Scotland, she balanced raising eight children with an active program of charitable works throughout her reign.", companions:"Shared today with St. Gertrude the Great, a German Benedictine mystic whose visions and writings on the Sacred Heart influenced later Catholic devotional life." },
  "11-18": { name:"The Dedication of the Basilicas of Saints Peter and Paul", title:"Optional Memorial", type:"reflection", text:"Commemorates the dedication of Rome's two great basilicas built over the traditional burial sites of Peter and Paul.", wiki:"St._Peter's_Basilica", bio:"The current St. Peter's Basilica, completed in the 17th century, replaced an earlier 4th-century church built by Constantine on the same spot." },
  "11-21": { name:"The Presentation of the Blessed Virgin Mary", title:"Memorial", type:"reflection", text:"Draws on an early non-biblical tradition that Mary's parents, Joachim and Anne, brought her to the Temple as a young child to be raised in its service.", wiki:null, bio:"The feast has ancient roots in Eastern Christianity before spreading to the West." },
  "11-23": { name:"Clement I", title:"Pope and Martyr", type:"reflection", text:"A successor of Peter as bishop of Rome whose surviving Letter to the Corinthians, urging unity after a local church dispute, is one of the oldest Christian documents outside the New Testament.", wiki:"Pope_Clement_I", born:"1st century", bio:"Tradition holds he was exiled to the Crimea and martyred by being thrown into the sea tied to an anchor.", companions:"Shared today with St. Columban, an Irish monk whose missionary journeys helped found monasteries across France, Switzerland, and Italy." },
  "11-24": { name:"Andrew Dung-Lac and Companions", title:"Martyrs", type:"reflection", text:"A Vietnamese priest martyred by beheading in 1839, honored together with well over a hundred other Vietnamese Catholics killed across three centuries of intermittent persecution.", wiki:"Andrew_Dung-Lac", born:"1795", bio:"Vietnam's history of Catholic martyrdom is among the most extensive of any nation, with this joint feast recognizing victims from the 17th through 19th centuries." },
  "11-25": { name:"Catherine of Alexandria", title:"Optional Memorial", type:"reflection", text:"A legendary Egyptian noblewoman said to have debated and converted pagan philosophers sent to refute her faith, before being martyred on a spiked wheel — origin of the 'Catherine wheel' firework and torture device.", wiki:"Catherine_of_Alexandria", bio:"One of medieval Europe's most popular saints despite scant historical evidence for her existence; Joan of Arc reported hearing her voice among those guiding her." },
  "11-30": { name:"Andrew", title:"Apostle", type:"quote", text:"We have found the Messiah.", source:"Andrew to his brother Simon Peter, John 1:41", wiki:"Andrew_the_Apostle", born:"1st century", bio:"The first apostle called by Jesus, according to John's Gospel, he's traditionally said to have been martyred on an X-shaped cross — now known as a 'St. Andrew's cross.' Patron of Scotland." },
  "12-04": { name:"John Damascene", title:"Priest and Doctor of the Church", type:"quote", text:"I do not worship matter, I worship the God of matter.", source:"from his writings defending the veneration of icons", wiki:"John_of_Damascus", born:"c. 675", bio:"A Syrian monk who wrote the era's most thorough defense of religious images during the Byzantine Iconoclasm controversy." },
  "12-07": { name:"Ambrose", title:"Bishop and Doctor of the Church", type:"reflection", text:"As bishop of Milan, he refused Communion to the Roman Emperor Theodosius until the emperor publicly repented for ordering a massacre — one of history's earliest assertions of the Church's moral authority over civil rulers.", wiki:"Ambrose", born:"c. 340", bio:"He baptized Augustine of Hippo and is credited with popularizing congregational hymn-singing in the West." },
  "12-08": { name:"The Immaculate Conception of the Blessed Virgin Mary", title:"Solemnity", type:"reflection", text:"Defined as dogma by Pope Pius IX in 1854, the feast holds that Mary was conceived free of original sin from the very first moment of her existence.", wiki:null, bio:"The dogma doesn't refer to Jesus's conception, a common misunderstanding, but to Mary's own conception by her parents." },
  "12-09": { name:"Juan Diego Cuauhtlatoatzin", title:"Optional Memorial", type:"quote", text:"Am I not here, I who am your Mother?", source:"words reported from the Our Lady of Guadalupe apparitions, 1531", wiki:"Juan_Diego", born:"c. 1474", bio:"An indigenous Aztec convert in Mexico whose reported visions of Mary, and the image said to have miraculously appeared on his cloak, made Our Lady of Guadalupe the most venerated image in the Americas." },
  "12-10": { name:"Our Lady of Loreto", title:"Optional Memorial", type:"reflection", text:"Honors a house in Loreto, Italy, venerated since the Middle Ages as the relocated childhood home of Mary, reportedly transported there from Nazareth.", wiki:"Sanctuary_of_the_Holy_House", bio:"Now a major pilgrimage site, legends of the house's miraculous flight made Loreto a traditional patron site for aviators." },
  "12-11": { name:"Damasus I", title:"Pope", type:"reflection", text:"As pope, he commissioned St. Jerome to produce a single, standardized Latin translation of the Bible — the project that became the Vulgate.", wiki:"Pope_Damasus_I", born:"c. 305", bio:"He also helped establish Latin, rather than Greek, as the Church's primary liturgical language in Rome." },
  "12-12": { name:"Our Lady of Guadalupe", title:"Optional Memorial", type:"reflection", text:"Commemorates the image of Mary said to have appeared on Juan Diego's cloak in 1531, now enshrined in Mexico City's Basilica of Guadalupe, one of the most-visited Catholic shrines in the world.", wiki:"Our_Lady_of_Guadalupe", bio:"Mary is reported to have appeared as a mestiza woman, resonating deeply with Mexico's mixed indigenous and Spanish population at a pivotal moment of evangelization." },
  "12-13": { name:"Lucy", title:"Virgin and Martyr", type:"reflection", text:"A Sicilian martyr whose legend, like several early virgin-martyrs, centers on refusing a forced marriage and pagan sacrifice under Diocletian's persecution.", wiki:"Lucy_of_Syracuse", born:"c. 283", bio:"Her name, meaning 'light,' made her especially associated with light in Scandinavian winter solstice customs, where her feast remains a major celebration today." },
  "12-21": { name:"Peter Canisius", title:"Priest and Doctor of the Church", type:"reflection", text:"A Dutch Jesuit whose catechism, written in clear question-and-answer form, became one of the most widely used religious textbooks in Counter-Reformation Europe.", wiki:"Peter_Canisius", born:"1521", bio:"He helped rebuild Catholic education across German-speaking lands after the Reformation's upheavals." },
  "12-23": { name:"John of Kanty", title:"Priest", type:"reflection", text:"A Polish university professor and priest renowned for giving away his own meals and clothing to the poor, sometimes returning home without his coat in winter.", wiki:"John_of_Kanty", born:"1390", bio:"Despite his learning, he was known above all for personal humility, reportedly refusing better treatment even when he could have claimed it by rank." },
  "12-27": { name:"John", title:"Apostle and Evangelist", type:"quote", text:"God is love.", source:"1 John 4:8", wiki:"John_the_Apostle", born:"1st century", bio:"Traditionally the youngest apostle and the only one believed to have died of natural causes, he's credited with the Fourth Gospel, three epistles, and the Book of Revelation." },
  "12-28": { name:"The Holy Innocents", title:"Feast", type:"reflection", text:"Commemorates the children of Bethlehem killed by King Herod's order, recorded in Matthew's Gospel, after he learned of a newborn 'king of the Jews.'", wiki:null, bio:"The Church counts these children as the earliest Christian martyrs, killed for a faith they never had the chance to profess." },
  "12-29": { name:"Thomas Becket", title:"Bishop and Martyr", type:"quote", text:"I am ready to die for my Lord, that in my blood the Church may obtain liberty and peace.", source:"said moments before his murder, Canterbury Cathedral, 1170", wiki:"Thomas_Becket", born:"1119", bio:"An Archbishop of Canterbury murdered by knights of King Henry II after a bitter dispute over the Church's independence from royal control — a killing that shocked Europe and made Canterbury a major pilgrimage site, later depicted in Chaucer's Canterbury Tales." },
  "12-31": { name:"Sylvester I", title:"Pope", type:"reflection", text:"Pope during the reign of Constantine, traditionally credited (though largely legendarily) with baptizing the emperor and benefiting from his new tolerance of Christianity after centuries of persecution.", wiki:"Pope_Sylvester_I", bio:"His nearly twenty-two-year papacy, one of the longest in early Church history, oversaw Christianity's transition from persecuted minority to favored imperial religion." },
  "01-04": { name:"Elizabeth Ann Seton", title:"Religious", type:"reflection", text:"The first native-born American to be canonized, she converted from Episcopalianism, was widowed with five children, and founded the first American parochial school and the Sisters of Charity.", wiki:"Elizabeth_Ann_Seton", born:"1774", bio:"Her school in Emmitsburg, Maryland, became the seed of the American Catholic parochial school system." },
  "01-05": { name:"John Neumann", title:"Bishop", type:"reflection", text:"A Czech immigrant who became Bishop of Philadelphia and built nearly a hundred Catholic schools in four years — more than any American bishop before him.", wiki:"John_Neumann", born:"1811", bio:"The first American bishop to be canonized and patron of Catholic education in the United States." },
  "01-08": { name:"Apollinaris of Hierapolis", title:"Bishop", type:"reflection", text:"A 2nd-century bishop and early Christian apologist who addressed a defence of the faith directly to Emperor Marcus Aurelius.", wiki:null, born:"2nd century", bio:"His writings are largely lost but were cited by later Church historians as among the most important of the Apologist era." },
  "01-09": { name:"Adrian III", title:"Pope", type:"reflection", text:"A 9th-century pope who died while travelling to attend an imperial diet convened to address the succession crisis threatening the Carolingian empire.", wiki:"Pope_Adrian_III", bio:"He reigned for just over a year; a legend that he fed grain from the papal stores to Romans during a famine contributed to his veneration." },
  "01-10": { name:"Gregory of Nyssa", title:"Bishop and Doctor of the Church", type:"reflection", text:"A younger brother of Basil the Great and a profound mystical theologian whose writings on the soul's infinite journey toward God influenced both Eastern and Western Christian spirituality.", wiki:"Gregory_of_Nyssa", born:"c. 335", bio:"One of the Cappadocian Fathers, his theological development of the Trinity helped finalise what would become Nicene orthodoxy." },
  "01-11": { name:"Theodosius the Cenobiarch", title:"Abbot", type:"reflection", text:"A 5th-century monk from Cappadocia who established a large monastery near Bethlehem where monks of different nationalities celebrated the liturgy each in their own language.", wiki:"Theodosius_the_Cenobiarch", born:"423", bio:"Called the 'Cenobiarch' — head of communal monks — he is considered the founder of organised communal monasticism in Palestine." },
  "01-12": { name:"Marguerite Bourgeoys", title:"Religious", type:"reflection", text:"A French nun who sailed to colonial Canada in 1653 and founded both the first school and the first non-cloistered teaching order in what is now Montreal.", wiki:"Marguerite_Bourgeoys", born:"1620", bio:"She built the first stone chapel in Montreal, still preserved today, and is canonised as the first female saint of Canada." },
  "01-14": { name:"Sava of Serbia", title:"Bishop", type:"reflection", text:"A Serbian prince who renounced his inheritance, became a monk on Mount Athos, and later organised the Serbian Orthodox Church as its first archbishop.", wiki:"Saint_Sava", born:"1175", bio:"Revered in the Orthodox Church as the patron saint of Serbia, he negotiated autocephaly for the Serbian Church from Constantinople in 1219." },
  "01-15": { name:"Paul the First Hermit", title:"Hermit", type:"reflection", text:"Traditionally the very first Christian hermit, who fled Roman persecution as a young man and reportedly lived alone in the Egyptian desert for over ninety years.", wiki:"Paul_of_Thebes", born:"c. 227", bio:"St. Jerome wrote his biography and described how Anthony the Great visited him near the end of his life, with a raven delivering bread for them both." },
  "01-16": { name:"Marcellus I", title:"Pope and Martyr", type:"reflection", text:"A pope whose brief tenure was torn apart by the Diocletianic persecution, which forced him to decide how to treat Christians who had handed over scriptures to avoid execution.", wiki:"Pope_Marcellus_I", bio:"He is counted among the martyrs; the chaos of his papacy contributed directly to a new church law requiring bishops to govern more carefully even under persecution." },
  "01-18": { name:"Beginning of the Week of Prayer for Christian Unity", title:"Observance", type:"reflection", text:"Observed annually from 18 to 25 January, these eight days of prayer bring together Christians of different traditions to pray for the visible unity of the Church.", wiki:null, bio:"The week was proposed in 1908 by an American Episcopalian priest and later adopted by the Vatican, which now co-sponsors it with the World Council of Churches." },
  "01-19": { name:"Sts Marius, Martha, Audifax and Abachum", title:"Martyrs", type:"reflection", text:"A Persian nobleman and his family — his wife Martha and their two sons — who travelled to Rome on pilgrimage, were arrested while burying the bodies of martyrs, and were executed themselves.", wiki:null, bio:"Among the earliest recorded group martyrdoms in Rome, they are venerated in both Eastern and Western calendars." },
  "01-23": { name:"Ildefonsus of Toledo", title:"Bishop", type:"reflection", text:"A 7th-century Archbishop of Toledo whose devotion to the Virgin Mary and treatise defending her perpetual virginity became one of the most influential Marian texts of the early Middle Ages.", wiki:"Ildefonsus_of_Toledo", born:"c. 607", bio:"A deeply learned bishop who presided over several Church councils in Visigothic Spain." },
  "01-29": { name:"Gildas the Wise", title:"Monk", type:"reflection", text:"A 6th-century British monk whose work On the Ruin and Conquest of Britain is the only substantial surviving literary source for sub-Roman Britain after the Roman withdrawal.", wiki:"Gildas", born:"c. 500", bio:"Writing with the fury of an Old Testament prophet, he blamed the Anglo-Saxon invasions on the moral failures of British kings and clergy." },
  "01-30": { name:"Bathild of Chelles", title:"Religious", type:"reflection", text:"An Anglo-Saxon woman sold into slavery in France who became queen after her master's death — and used her royal position to outlaw the slave trade within the Frankish kingdom.", wiki:"Balthild", born:"c. 626", bio:"After her husband's death she retired to the monastery of Chelles, refusing the regency, and died as an ordinary nun." },
  "02-01": { name:"Brigid of Ireland", title:"Abbess", type:"reflection", text:"One of Ireland's three patron saints, she founded a great double monastery at Kildare whose flame, tended by her nuns, was said to have burned without interruption for centuries.", wiki:"Brigid_of_Kildare", born:"c. 451", bio:"Her feast falls on the ancient Celtic festival of Imbolc, marking the beginning of spring; countless holy wells, crosses, and places across Ireland bear her name." },
  "02-04": { name:"Andrew Corsini", title:"Bishop", type:"reflection", text:"A Florentine Carmelite bishop of Fiesole who resolved bitter civic disputes and was reportedly so humble that he refused at first to accept episcopal consecration.", wiki:"Andrew_Corsini", born:"1302", bio:"Said to have been dedicated to Our Lady before his birth after his mother dreamed she gave birth to a wolf that became a lamb upon entering a church." },
  "02-07": { name:"Colette of Corbie", title:"Religious", type:"reflection", text:"A French carpenter's daughter who lived as a hermit before reforming many convents of the Poor Clares, restoring the original strict poverty that Clare of Assisi had prescribed.", wiki:"Colette_of_Corbie", born:"1381", bio:"She founded seventeen reformed convents across France, Savoy, and Flanders, sparking what became known as the Colettine reform." },
  "02-09": { name:"Apollonia", title:"Martyr", type:"reflection", text:"An aged deaconess of Alexandria who, during a public uprising against Christians, had all her teeth forcibly smashed before being threatened with fire — and walked willingly into the flames rather than deny her faith.", wiki:"Apollonia", bio:"One of the most venerated early martyrs; her patronage of dentists stems from the manner of her torture." },
  "02-12": { name:"Seven Founders of the Servite Order", title:"Religious", type:"reflection", text:"Seven wealthy Florentine merchants who in 1233 abandoned their businesses together to live in prayer and penance on Monte Senario, founding the Order of Servants of Mary.", wiki:"Seven_Holy_Founders", bio:"Their collective story of renouncing prosperity for religious life made a striking impression on the mercantile culture of 13th-century Florence." },
  "02-13": { name:"Martinian the Hermit", title:"Hermit", type:"reflection", text:"A Palestinian hermit of the 5th century celebrated for a life of extreme solitude and penance in the wilderness near Caesarea Maritima.", wiki:null, born:"c. 400", bio:"Later generations included his feast in both Eastern and Western martyrologies as a model of the solitary contemplative life." },
  "02-15": { name:"Sigfrid of Växjö", title:"Bishop", type:"reflection", text:"An English monk sent to evangelise Sweden at the request of its king, who became the first bishop of Växjö and is called the Apostle of Sweden.", wiki:"Sigfrid_of_Sweden", bio:"He is credited with baptising King Olof of Sweden, and remains a patron saint of the country to this day." },
  "02-16": { name:"Onesimus", title:"Martyr", type:"reflection", text:"An enslaved man mentioned in Paul's letter to Philemon who, by tradition, was eventually freed, became bishop of Ephesus, and was later martyred for his faith.", wiki:"Onesimus", born:"1st century", bio:"Paul's brief letter on his behalf — asking Philemon to receive him 'no longer as a slave, but as a dear brother' — became an early Christian statement on the dignity of every person." },
  "02-18": { name:"Fra Angelico", title:"Religious", type:"reflection", text:"A Dominican friar and one of the greatest painters of the early Italian Renaissance, who reportedly wept each time he painted the Crucifixion.", wiki:"Fra_Angelico", born:"c. 1395", bio:"His frescoes in the convent of San Marco in Florence, painted as aids to prayer for the resident monks, remain among the most luminous religious artworks ever created." },
  "02-19": { name:"Conrad of Piacenza", title:"Religious", type:"reflection", text:"An Italian nobleman who accidentally started a forest fire and, when an innocent man was about to be executed for it, confessed his guilt — and then gave away his entire estate to pay compensation and entered religious life.", wiki:"Conrad_of_Piacenza", born:"1290", bio:"He later lived as a hermit in Sicily, where miracles were reported at his tomb almost immediately after his death." },
  "02-20": { name:"Francisco and Jacinta Marto", title:"Visionaries", type:"reflection", text:"Two Portuguese shepherd children, aged eight and seven, who reported seeing the Virgin Mary at Fátima in 1917 alongside their cousin Lúcia; both died young — Francisco at ten, Jacinta at nine — of influenza.", wiki:"Francisco_and_Jacinta_Marto", born:"1908 (Francisco), 1910 (Jacinta)", bio:"They were canonised together by Pope Francis in 2017, the youngest non-martyrs ever raised to sainthood by the Catholic Church." },
  "02-24": { name:"Matthias", title:"Apostle", type:"reflection", text:"Chosen by lot to replace Judas among the Twelve, fulfilling Peter's call to restore the full number of apostolic witnesses to the resurrection.", wiki:"Matthias_the_Apostle", born:"1st century", bio:"This was his traditional feast day in the older Roman Calendar; later moved to May 14. Tradition places his missionary work and martyrdom in Judea or Ethiopia." },
  "02-25": { name:"Tarasius of Constantinople", title:"Bishop", type:"reflection", text:"A Byzantine patriarch who, though a layman when elected, restored veneration of religious icons at the Second Council of Nicaea in 787 after decades of imperial iconoclasm.", wiki:"Tarasius_of_Constantinople", born:"c. 730", bio:"He controversially permitted clergy who had lapsed during the iconoclast period to retain their posts, prioritising healing over punishment." },
  "02-26": { name:"Porphyry of Gaza", title:"Bishop", type:"reflection", text:"A 5th-century bishop of Gaza who used his connections at the Byzantine imperial court to have the city's last great pagan temples demolished, against fierce local resistance.", wiki:"Porphyry_of_Gaza", born:"c. 347", bio:"His biography, written by his deacon Mark, is one of the most vivid accounts of the tensions between Christianity and traditional religion in late Roman cities." },
  "02-28": { name:"Hilary of Aquileia", title:"Bishop and Martyr", type:"reflection", text:"An early bishop of Aquileia in northern Italy who was martyred during one of the Roman Empire's persecutions of Christians.", wiki:null, bio:"Aquileia was one of the most important early Christian communities in the Western Roman Empire, ranking alongside Rome and Milan in prestige." },
  "03-01": { name:"David of Wales", title:"Bishop", type:"reflection", text:"The patron saint of Wales, who founded a monastery of extreme austerity on the western tip of the Welsh coast and became the country's most celebrated religious figure.", wiki:"Saint_David", born:"c. 500", bio:"His last recorded words — 'Do the little things' — remain a beloved motto in Welsh culture; his feast day is marked with daffodils and leeks across Wales." },
  "03-02": { name:"Chad of Lichfield", title:"Bishop", type:"reflection", text:"An Anglo-Saxon monk trained in the Irish tradition who humbly stepped aside when a dispute arose over his appointment as Bishop of York, and later became Bishop of Lichfield.", wiki:"Chad_of_Lichfield", bio:"Bede praised him as a model bishop who travelled his diocese on foot rather than on horseback, until Archbishop Theodore ordered him to ride for the sake of efficiency." },
  "03-03": { name:"Katharine Drexel", title:"Religious", type:"reflection", text:"An American heiress who inherited twenty million dollars and gave every cent of it — along with her life — to found schools for African-American and Native American children.", wiki:"Katharine_Drexel", born:"1858", bio:"She founded Xavier University in New Orleans, still the only historically Black Catholic university in the United States." },
  "03-05": { name:"John Joseph of the Cross", title:"Priest", type:"reflection", text:"An Italian Franciscan friar famed for extreme penances and mystical gifts, including bilocation and the ability to survive for years on the Eucharist alone according to his contemporaries.", wiki:"John_Joseph_of_the_Cross", born:"1654", bio:"He spent much of his ministry reforming the lax discipline of several Franciscan houses in the Kingdom of Naples." },
  "03-06": { name:"Colette of Corbie", title:"Religious", type:"reflection", text:"A French carpenter's daughter who, after years as a hermit, was commissioned by the pope to reform the Poor Clares, restoring Francis and Clare's original vision of absolute poverty.", wiki:"Colette_of_Corbie", born:"1381", bio:"She founded seventeen new convents and is credited with reviving Franciscan observance across France, Savoy, and Flanders." },
  "03-10": { name:"Forty Martyrs of Sebaste", title:"Martyrs", type:"reflection", text:"Forty Roman soldiers who were stripped naked and left on a frozen lake in Armenia to die in 320 for refusing to sacrifice to the Roman gods, one of the most celebrated group martyrdoms in the early Church.", wiki:"Forty_Martyrs_of_Sebaste", bio:"One soldier reportedly wavered and ran to the warm bath prepared for those who would apostatise; a guard who witnessed the martyrs' courage converted on the spot and took his place." },
  "03-11": { name:"Sophronius of Jerusalem", title:"Bishop", type:"reflection", text:"A 7th-century Patriarch of Jerusalem who personally surrendered the city to the Muslim Caliph Omar in 637, negotiating protections for its Christian inhabitants and churches.", wiki:"Sophronius_of_Jerusalem", born:"c. 560", bio:"A strong defender of the orthodox doctrine of Christ's two wills, his tenure saw Jerusalem pass from Byzantine to Islamic rule — one of the defining moments of Church history." },
  "03-12": { name:"Gregory the Great", title:"Pope and Doctor of the Church", type:"reflection", text:"The pope who sent Augustine to evangelise England, reorganised the Church's care for the poor, and whose liturgical reforms gave the Gregorian Chant its name.", wiki:"Pope_Gregory_I", born:"c. 540", bio:"Celebrated on this date in the older calendar; one of only two popes given the title 'the Great' by popular acclamation." },
  "03-13": { name:"Euphrasia of Constantinople", title:"Virgin", type:"reflection", text:"A 5th-century Byzantine noblewoman betrothed to a senator who instead chose to enter an Egyptian monastery, eventually persuading the emperor himself to release her from the engagement.", wiki:"Euphrasia_of_Constantinople", born:"c. 380", bio:"Her life story, combining high birth with radical renunciation, made her widely read in both Eastern and Western monastic literature." },
  "03-14": { name:"Matilda of Germany", title:"Queen", type:"reflection", text:"A 10th-century German queen whose charity to the poor and founding of monasteries won her popular acclaim, despite the hostility of her own sons who objected to how much royal wealth she gave away.", wiki:"Matilda_of_Ringelheim", born:"c. 895", bio:"She outlived her husband Henry I and two of her sons, who later repented of their treatment of her." },
  "03-15": { name:"Louise de Marillac", title:"Religious", type:"reflection", text:"A French noblewoman who co-founded the Daughters of Charity with Vincent de Paul, creating the first major order of women working openly in hospitals, prisons, and battlefields rather than in a cloister.", wiki:"Louise_de_Marillac", born:"1591", bio:"Her Daughters of Charity became the largest congregation of women religious in the world by the 19th century." },
  "03-16": { name:"Heribert of Cologne", title:"Bishop", type:"reflection", text:"A 10th-century Archbishop of Cologne who fell out of favour with Holy Roman Emperor Henry II but was widely revered by his people for his generosity and ascetic holiness.", wiki:"Heribert_of_Cologne", born:"c. 970", bio:"He founded the Deutz Abbey near Cologne and gave away large amounts of Church wealth to relieve a widespread famine." },
  "03-20": { name:"Cuthbert of Lindisfarne", title:"Bishop", type:"reflection", text:"An Anglo-Saxon shepherd-boy who became a monk, then the most beloved bishop in northern England, eventually retiring alone to an island hermitage off the Northumberland coast.", wiki:"Cuthbert_of_Lindisfarne", born:"c. 634", bio:"His undecayed body, discovered eleven years after burial, was carried for over a century by monks fleeing Viking raids, before being enshrined in what became Durham Cathedral." },
  "03-21": { name:"Nicholas of Flüe", title:"Hermit", type:"reflection", text:"A Swiss soldier, magistrate, and father of ten who at fifty received his family's blessing to become a hermit — and reportedly lived for nineteen years on nothing but the Eucharist.", wiki:"Nicholas_of_Flüe", born:"1417", bio:"His word is credited with preventing civil war in Switzerland in 1481; he is the country's patron saint." },
  "03-22": { name:"Nicholas Owen", title:"Martyr", type:"reflection", text:"A Jesuit lay brother and carpenter who spent decades ingeniously constructing priest-holes — secret chambers inside English Catholic houses — that saved the lives of hundreds of missionaries during the Elizabethan persecution.", wiki:"Nicholas_Owen", born:"c. 1562", bio:"He was tortured to death at the Tower of London in 1606 without revealing the location of a single hiding place." },
  "03-24": { name:"Catherine of Sweden", title:"Religious", type:"reflection", text:"The fourth daughter of Bridget of Sweden who accompanied her mother on pilgrimages across Europe, helped secure her canonisation, and led her monastery in Vadstena for many years after Bridget's death.", wiki:"Catherine_of_Sweden", born:"1331", bio:"She was known for her extreme beauty and for consistently turning away powerful suitors who sought her hand after her husband's early death." },
  "03-26": { name:"Ludger of Münster", title:"Bishop", type:"reflection", text:"A Frisian missionary trained in England under Alcuin who evangelised pagan Saxons along the North Sea coast and became the first Bishop of Münster.", wiki:"Liudger", born:"c. 742", bio:"Known as the Apostle of Saxony, he reportedly replied to Charlemagne's impatience with his slow progress: 'First teach them to believe, and then they will obey.'" },
  "03-27": { name:"Rupert of Salzburg", title:"Bishop", type:"reflection", text:"A 7th-century Frankish bishop who evangelised the Austrian Alps and founded Salzburg's first monastery, giving the city its earliest Christian institutions.", wiki:"Rupert_of_Salzburg", born:"c. 660", bio:"He is patron saint of Salzburg and of the salt-miners whose trade gave the city its name." },
  "03-28": { name:"Tutilo of St Gall", title:"Monk", type:"reflection", text:"A 9th-century Swiss Benedictine monk celebrated as a poet, composer, sculptor, painter, metalsmith, and teacher — one of the most versatile artists of the early medieval period.", wiki:null, born:"c. 850", bio:"His musical compositions and carvings survive in fragments at the Abbey of St Gall, one of Europe's great centres of medieval learning." },
  "03-29": { name:"Gwenael of Brittany", title:"Abbot", type:"reflection", text:"A 6th-century Breton monk, disciple of Gildas, who founded a monastery on a small island before becoming the first bishop of Vannes in Brittany.", wiki:null, born:"6th century", bio:"He is venerated as one of the founding saints of Brittany, a region with a particularly rich tradition of Celtic Christian monasticism." },
  "03-30": { name:"John Climacus", title:"Abbot", type:"quote", text:"The man who has learned humility has become a stranger to the passions.", source:"The Ladder of Divine Ascent", wiki:"John_Climacus", born:"c. 579", bio:"A monk of Mount Sinai whose Ladder of Divine Ascent, describing thirty steps toward spiritual perfection, remains one of the most widely read works of Eastern Christian spirituality." },
  "03-31": { name:"Benjamin the Deacon", title:"Martyr", type:"reflection", text:"A Persian deacon arrested for preaching Christianity who endured years of imprisonment and torture before being executed around 424 during the great Persian Christian persecution.", wiki:null, bio:"The persecution under King Yazdegerd II killed thousands of Persian Christians and is commemorated in both Eastern and Western martyrologies." },
  "04-01": { name:"Hugh of Grenoble", title:"Bishop", type:"reflection", text:"A reluctant French bishop who tried twice to resign his position and retire to a monastery, but was ordered to stay and served for over fifty years, transforming the diocese.", wiki:"Hugh_of_Grenoble", born:"1052", bio:"He welcomed Bruno and his companions to the wilderness valley that became the Grande Chartreuse, birthplace of the Carthusian order." },
  "04-03": { name:"Richard of Chichester", title:"Bishop", type:"reflection", text:"An English bishop famous for his personal simplicity — reportedly using a wooden cup and plate himself while ensuring his household was generous to the poor.", wiki:"Richard_of_Chichester", born:"c. 1197", bio:"His prayer asking to know Christ more clearly, love him more dearly, and follow him more nearly was later adapted into a famous song from the musical Godspell." },
  "04-06": { name:"William of Eskill", title:"Abbot", type:"reflection", text:"A French Augustinian monk who settled in Denmark, revived a struggling monastery at Æbelholt, and became one of the most important church reformers in 12th-century Scandinavia.", wiki:null, born:"c. 1125", bio:"His canonisation in 1224 was the first performed specifically for a non-Scandinavian saint living and dying in Scandinavia." },
  "04-08": { name:"Julie Billiart", title:"Religious", type:"reflection", text:"A French laywoman who suffered a mysterious paralysis for twenty-two years, and whose instantaneous cure during prayer reportedly launched her vocation to found the Sisters of Notre Dame de Namur.", wiki:"Julie_Billiart", born:"1751", bio:"She founded the congregation to educate poor girls, and her order now works in over thirty countries worldwide." },
  "04-09": { name:"Mary of Cleophas", title:"Disciple", type:"reflection", text:"Named in John's Gospel as one of the women standing at the foot of the Cross alongside Mary the mother of Jesus, she is traditionally identified as the mother of the apostle James the Less.", wiki:null, born:"1st century", bio:"Early tradition venerated her as one of the 'Three Marys' who accompanied Jesus's mother throughout the Passion and to the empty tomb." },
  "04-10": { name:"Fulbert of Chartres", title:"Bishop", type:"reflection", text:"A French scholar and bishop who rebuilt Chartres Cathedral after fire destroyed it and was one of the most respected teachers and correspondents of early 11th-century Europe.", wiki:"Fulbert_of_Chartres", born:"c. 952", bio:"His school at Chartres attracted students from across Europe and contributed to the intellectual revival that preceded the founding of the great medieval universities." },
  "04-12": { name:"Julius I", title:"Pope", type:"reflection", text:"A 4th-century pope who firmly defended the exiled Athanasius against Arian pressure, asserting that no Eastern bishop could be deposed without the knowledge and consent of Rome.", wiki:"Pope_Julius_I", bio:"His stance helped establish the principle of Roman primacy in doctrinal disputes — a landmark moment in the development of papal authority." },
  "04-14": { name:"Lydwine of Schiedam", title:"Virgin", type:"reflection", text:"A Dutch woman who suffered a severe skating accident at fifteen and spent the following thirty-eight years bedridden with worsening illnesses, sustained — according to her contemporaries — by mystical experiences and the Eucharist alone.", wiki:"Lydwine_of_Schiedam", born:"1380", bio:"Patron of the chronically ill and those who suffer, her story became widely known through a biography by the novelist J.-K. Huysmans in the 19th century." },
  "04-15": { name:"Paternus of Wales", title:"Bishop", type:"reflection", text:"A 6th-century Welsh monk who founded a monastery at Llanbadarn Fawr and became one of the founding fathers of the Welsh Church.", wiki:null, born:"c. 500", bio:"Llanbadarn Fawr — the great parish of Padarn — remained one of the most important ecclesiastical sites in Wales throughout the Middle Ages." },
  "04-16": { name:"Benedict Joseph Labre", title:"Pilgrim", type:"reflection", text:"A French peasant rejected by multiple religious orders who spent his life as a wandering pilgrim, sleeping rough outside churches and living entirely on alms.", wiki:"Benedict_Joseph_Labre", born:"1748", bio:"When he died outside a Rome church in 1783, the children of the neighbourhood reportedly ran through the streets shouting 'The saint is dead!' — he had become beloved among the city's poor." },
  "04-17": { name:"Stephen Harding", title:"Abbot", type:"reflection", text:"An English monk who co-founded the Cistercian order in the forests of Burgundy and wrote its founding charter, the Charter of Charity, balancing monastic unity with the autonomy of individual houses.", wiki:"Stephen_Harding", born:"c. 1060", bio:"The Cistercians, under his guidance and later under Bernard of Clairvaux, became the dominant monastic movement of the 12th century." },
  "04-18": { name:"Apollonius the Apologist", title:"Martyr", type:"reflection", text:"A Roman senator and Christian intellectual executed around 185 under Emperor Commodus, after a servant denounced him; he reportedly delivered a brilliant defence of Christianity before the Senate.", wiki:"Apollonius_the_Apologist", bio:"His case was unusual: Roman law was unclear whether to punish him for being a Christian or his servant for denouncing him." },
  "04-19": { name:"Alphege of Canterbury", title:"Bishop and Martyr", type:"reflection", text:"Archbishop of Canterbury kidnapped by Danish Viking raiders who killed him when the ransom could not be paid — he had refused to let it be raised from the impoverished people of his diocese.", wiki:"Alphege_of_Canterbury", born:"954", bio:"His refusal to burden his flock to save himself struck both the Vikings and later chroniclers as a remarkable act of pastoral self-sacrifice." },
  "04-20": { name:"Agnes of Montepulciano", title:"Virgin", type:"reflection", text:"An Italian Dominican nun who became abbess at fifteen and reportedly experienced ecstatic visions, levitation during prayer, and the multiplication of food for her community.", wiki:"Agnes_of_Montepulciano", born:"1268", bio:"Catherine of Siena visited her shrine before her own religious conversion, an encounter later depicted by Luca Signorelli and other painters." },
  "04-22": { name:"Theodore of Sikeon", title:"Bishop", type:"reflection", text:"A 6th-century Byzantine monk born of a dancing girl in a roadside inn who became one of the most revered wonder-workers of the early Byzantine Church.", wiki:"Theodore_of_Sykeon", born:"c. 540", bio:"His biography, one of the most detailed surviving accounts of a Byzantine holy man, describes him spending months at a time suspended in an iron cage, praying." },
  "04-24": { name:"Fidelis of Sigmaringen", title:"Priest and Martyr", type:"reflection", text:"A German Capuchin lawyer-turned-friar who, while preaching in the Swiss valleys, was hacked to death by a mob that demanded he renounce Catholicism.", wiki:"Fidelis_of_Sigmaringen", born:"1578", bio:"He reportedly told the crowd: 'I came to extinguish heresy, not to embrace it.' He is the first martyr canonised by the Congregation for the Propagation of the Faith." },
  "04-26": { name:"Our Lady of Good Counsel", title:"Optional Memorial", type:"reflection", text:"An ancient Marian devotion centred on an image in Genazzano, Italy, traditionally associated with the miraculous arrival of a fresco said to have floated from Albania during the Ottoman invasion.", wiki:null, bio:"Pope Paul II was among the first pilgrims; later popes including Leo XIII were deeply devoted to the image." },
  "04-27": { name:"Zita of Lucca", title:"Virgin", type:"reflection", text:"An Italian domestic servant who worked for the same Lucca family for 48 years, rising before dawn to pray before her duties and secretly giving her food and clothing to the poor.", wiki:"Zita", born:"1212", bio:"Patron of domestic servants and those in domestic service, she is celebrated particularly in Italy with traditions of distributing bread to the poor." },
  "05-04": { name:"Florian of Austria", title:"Martyr", type:"reflection", text:"A Roman officer martyred in Austria in 304 who became the patron of Poland, Austria, and Upper Austria, and is the patron saint of those facing floods and fire — particularly firefighters.", wiki:"Saint_Florian", born:"c. 250", bio:"Legend holds he was thrown into the Enns river with a stone around his neck; images often show him pouring water on a burning building." },
  "05-05": { name:"Hilary of Arles", title:"Bishop", type:"reflection", text:"A 5th-century Archbishop of Arles known for personal austerity and extensive charity, though his conflict with Pope Leo I over jurisdiction led to his powers being restricted.", wiki:"Hilary_of_Arles", born:"c. 401", bio:"His dispute with Rome over the rights of metropolitan bishops was settled by an imperial rescript that strengthened papal authority over provincial churches." },
  "05-06": { name:"Marian and James", title:"Martyrs", type:"reflection", text:"Two North African Christians — Marian a reader, James a deacon — martyred together during the Valerian persecution of 259, whose vivid passion account survives in considerable detail.", wiki:null, bio:"Their account describes the group visions they experienced in prison and was widely read in early North African Christian communities." },
  "05-07": { name:"John of Beverley", title:"Bishop", type:"reflection", text:"An Anglo-Saxon Bishop of York who was known for educating the poor and performing healings, and who ordained Bede — who wrote warmly of him as a wise and gentle teacher.", wiki:"John_of_Beverley", born:"c. 640", bio:"Henry V attributed his victory at Agincourt in 1415 partly to John's intercession, and the victory was celebrated on this feast day." },
  "05-08": { name:"Our Lady of Luján", title:"Feast", type:"reflection", text:"Argentina's most beloved Marian shrine, centred on a small terracotta statue of the Immaculate Conception that, according to tradition, a cart carrying the statue in 1630 refused to move until it was left in the village of Luján.", wiki:"Our_Lady_of_Luján", bio:"The Basilica of Luján, built over the site, is now the most visited Catholic pilgrimage site in South America." },
  "05-09": { name:"Pachomius", title:"Abbot", type:"reflection", text:"An Egyptian soldier converted to Christianity who founded the first organised communal monasteries — the model of religious life in community that would spread across the Christian world.", wiki:"Pachomius_the_Great", born:"c. 292", bio:"Where Anthony the Great pioneered solitary desert life, Pachomius pioneered living it together under a common rule — the template for all later monasticism." },
  "05-11": { name:"Ignatius of Laconi", title:"Friar", type:"reflection", text:"A Sardinian Capuchin lay brother who spent forty years as a beggar-friar collecting alms through the streets of Cagliari, becoming beloved for his gentleness with the poor and the sick.", wiki:"Ignatius_of_Laconi", born:"1701", bio:"He reportedly developed the ability to see through human pretension, and the wealthy of Cagliari learned quickly that he could not be deceived with false shows of poverty." },
  "05-15": { name:"Isidore the Farmer", title:"Layman", type:"reflection", text:"A Spanish farm labourer who worked the fields outside Madrid all his life, rising before dawn for Mass each morning, and was said to receive miraculous help with his ploughing from angels on days when prayer made him late.", wiki:"Isidore_the_Farmer", born:"c. 1070", bio:"Patron of farmers and of Madrid, he and his wife María de la Cabeza — also venerated — are one of the few married couples both raised to sainthood." },
  "05-16": { name:"Brendan the Navigator", title:"Abbot", type:"reflection", text:"An Irish monk who, according to the Voyage of Brendan written centuries after his death, set sail into the Atlantic with seventeen monks and made a seven-year journey to a mysterious 'Isle of the Blessed.'", wiki:"Brendan_the_Navigator", born:"c. 484", bio:"Whether the voyage is historical legend or spiritual allegory, a 1976 reconstruction proved the journey from Ireland to North America in a traditional currach was physically possible." },
  "05-17": { name:"Paschal Baylon", title:"Friar", type:"reflection", text:"A Spanish Franciscan lay brother and former shepherd who spent his days in the chapel doorway, greeting visitors, and his nights in prayer before the Blessed Sacrament.", wiki:"Paschal_Baylon", born:"1540", bio:"Named patron of Eucharistic congresses and confraternities, his profound devotion to the Eucharist made him a model for later movements of Adoration." },
  "05-19": { name:"Dunstan of Canterbury", title:"Bishop", type:"reflection", text:"An Anglo-Saxon Archbishop of Canterbury who reformed English monasteries, advised kings, and was an accomplished metalworker — legend says he once caught the devil by the nose with a pair of hot tongs.", wiki:"Dunstan_of_Canterbury", born:"c. 909", bio:"He practically rebuilt English monasticism after the devastation of the Viking raids and was the dominant figure in English church life for half a century." },
  "05-23": { name:"John Baptist de Rossi", title:"Priest", type:"reflection", text:"An 18th-century Roman priest who spent his evenings preaching to the homeless men sleeping under Rome's bridges and in its markets, and worked to establish shelters for the city's dispossessed.", wiki:"John_Baptist_de_Rossi", born:"1698", bio:"Despite suffering epileptic episodes that made his early career difficult, he was eventually appointed a canon of Santa Maria in Cosmedin and continued his street ministry for decades." },
  "05-24": { name:"Our Lady Help of Christians", title:"Memorial", type:"reflection", text:"A Marian title prominent in Catholic tradition, celebrated on this day and closely associated with Don Bosco's Salesians and with the patronage of Australia, Papua New Guinea, and China.", wiki:null, bio:"Pope Pius VII instituted the feast in 1815 to give thanks for his release from Napoleonic imprisonment, and later Popes promoted it widely." },
  "05-28": { name:"Bernard of Montjoux", title:"Priest", type:"reflection", text:"A 10th-century Italian priest who spent over forty years evangelising remote Alpine valleys and who built hospices at the two great Alpine passes still known as the Great and Little St Bernard Pass.", wiki:"Bernard_of_Montjoux", born:"c. 923", bio:"The large dogs bred at those hospices to rescue travellers lost in snow — the Saint Bernard — are the living memorial of his mountain charity." },
  "05-30": { name:"Joan of Arc", title:"Virgin and Martyr", type:"reflection", text:"A French peasant girl who, claiming divine visions, led French armies to break the Siege of Orléans and helped crown the Dauphin as Charles VII — before being tried for heresy and burned at the stake at nineteen.", wiki:"Joan_of_Arc", born:"c. 1412", bio:"Patron of France and of soldiers, she was condemned by an English-sympathising tribunal, rehabilitated twenty-five years after her death, and canonised in 1920." },
  "06-04": { name:"Francis Caracciolo", title:"Priest", type:"reflection", text:"A Neapolitan nobleman who co-founded the Clerks Regular Minor, devoted to perpetual adoration of the Blessed Sacrament and missionary work — reportedly spending whole nights in prayer before the tabernacle.", wiki:"Francis_Caracciolo", born:"1563", bio:"His congregation required members to refuse any ecclesiastical promotion or dignity, so that service rather than advancement remained their only motive." },
  "06-07": { name:"Willibald of Eichstätt", title:"Bishop", type:"reflection", text:"An Anglo-Saxon pilgrim who spent seven years travelling Palestine, Syria, and Constantinople before being sent by Boniface to evangelise Germany and become the first Bishop of Eichstätt.", wiki:"Willibald_of_Eichstätt", born:"c. 700", bio:"His pilgrimage account, recorded by a nun named Huneberc, is the earliest known travelogue written by an English person." },
  "06-08": { name:"William of York", title:"Bishop", type:"reflection", text:"A 12th-century Archbishop of York whose appointment was bitterly contested for years, partly by supporters of Bernard of Clairvaux, before he was finally reinstated and died peacefully — though some suspected poisoning.", wiki:"William_FitzHerbert", born:"c. 1100", bio:"His death triggered a surge of reported miracles, and his canonisation was a rare instance of a saint whose holiness was controversial even during his lifetime." },
  "06-10": { name:"Ithamar of Rochester", title:"Bishop", type:"reflection", text:"The first Anglo-Saxon bishop in England, consecrated by Archbishop Honorius around 644, marking the transition of Church leadership from Roman missionaries to native English clergy.", wiki:null, bio:"Bede names him as a man of great learning and sanctity; his appointment represented a milestone in the Christianisation of the English people." },
  "06-12": { name:"John of Sahagun", title:"Priest", type:"reflection", text:"A Spanish Augustinian friar so bold in his public condemnation of civic injustice that a noblewoman whose lover he had rebuked allegedly had him poisoned.", wiki:"John_of_Sahagún", born:"c. 1430", bio:"He is credited with pacifying violent feuds between rival noble families in Salamanca through the sheer force of his preaching." },
  "06-14": { name:"Elisha", title:"Prophet", type:"reflection", text:"The prophet who succeeded Elijah in the Hebrew Bible — performing miracles including the purification of a poisoned spring and the raising of a dead child — commemorated in both Eastern and Western Christian calendars.", wiki:"Elisha", born:"9th century BC", bio:"He served as prophet to Israel for about fifty years, a period described in Kings as one of Syria's greatest military pressure on the northern kingdom." },
  "06-15": { name:"Vitus", title:"Martyr", type:"reflection", text:"A Sicilian child-martyr whose legend describes him surviving multiple tortures — including a cauldron of boiling oil — before dying with his tutor and nurse, probably during the Diocletianic persecution.", wiki:"Vitus", bio:"One of the Fourteen Holy Helpers of medieval popular devotion; Prague's great Gothic cathedral, which houses the Bohemian crown jewels, is named in his honour." },
  "06-16": { name:"John Francis Regis", title:"Priest", type:"reflection", text:"A French Jesuit who worked among the poorest communities of the Auvergne and Vivarais, travelling in all weather to reach remote mountain villages that saw a priest only once or twice a year.", wiki:"John_Francis_Regis", born:"1597", bio:"He famously walked for hours through mountain snow to reach remote parishes, reportedly confessing as many as 600 penitents in a day." },
  "06-17": { name:"Emily de Vialar", title:"Religious", type:"reflection", text:"A French woman who used her inheritance to found the Sisters of St Joseph of the Apparition, whose missionaries quickly spread to Algeria, Tunisia, Malta, and beyond.", wiki:"Emily_de_Vialar", born:"1797", bio:"Her order's focus on education and healthcare in North Africa and the Middle East made her a pioneering figure in 19th-century missionary medicine." },
  "06-18": { name:"Gregory Barbarigo", title:"Bishop", type:"reflection", text:"A Venetian cardinal and bishop of Padua who used his vast personal wealth to build a printing press capable of producing texts in many Eastern languages, hoping to foster reunion with Eastern churches.", wiki:"Gregory_Barbarigo", born:"1625", bio:"A participant in the conclave that elected three different popes, he was himself considered papabile — a likely candidate for election — on more than one occasion." },
  "06-20": { name:"Silverius", title:"Pope and Martyr", type:"reflection", text:"A 6th-century pope forcibly deposed and exiled by the Byzantine Empress Theodora for refusing to reinstate a deposed patriarch of Constantinople, dying in exile on a barren island.", wiki:"Pope_Silverius", bio:"His case represents one of the starkest examples of imperial interference in papal succession during the turbulent period of Justinian's reconquest of Italy." },
  "06-23": { name:"Etheldreda of Ely", title:"Abbess", type:"reflection", text:"An Anglo-Saxon princess twice married and twice refusing to consummate her marriages, she eventually founded a great double monastery on the island of Ely, where England's magnificent Ely Cathedral now stands.", wiki:"Æthelthryth", born:"c. 636", bio:"Her body was found undecayed eleven years after burial, and her abbey became one of the most important pilgrimage sites in medieval England." },
  "06-25": { name:"William of Vercelli", title:"Abbot", type:"reflection", text:"An Italian hermit who founded the Montevergine monastery in the mountains of Campania, which became a major pilgrimage site due to its beloved icon of Our Lady.", wiki:"William_of_Montevergine", born:"1085", bio:"He reportedly rejected advice to model his community on existing rules, preferring a way of life drawn directly from his own prayerful discernment in the wilderness." },
  "06-26": { name:"Josemaría Escrivá", title:"Priest", type:"quote", text:"Don't try to be older than you are. Your youthfulness is a treasure; don't squander it.", source:"The Way", wiki:"Josemaría_Escrivá", born:"1902", bio:"A Spanish priest who founded Opus Dei in 1928, teaching that ordinary professional work and family life can be means of holiness — a concept that transformed Catholic lay spirituality." },
  "07-01": { name:"Junipero Serra", title:"Priest", type:"reflection", text:"A Franciscan missionary from Mallorca who founded a chain of nine missions along coastal California, baptising thousands of indigenous people — though his treatment of Native Americans remains a subject of historical debate.", wiki:"Junípero_Serra", born:"1713", bio:"Canonised by Pope Francis in 2015, Serra is patron of California, though some Native communities have called for his monuments to be reconsidered." },
  "07-02": { name:"Bernardino Realino", title:"Priest", type:"reflection", text:"An Italian Jesuit who, after a distinguished legal career, became a priest and spent over forty years in Lecce, so beloved by the city that its citizens resisted even his own request to be transferred.", wiki:"Bernardino_Realino", born:"1530", bio:"When he lay dying, a Lecce nobleman collected several drops of his blood in a vial; like San Gennaro's blood in Naples, this relic is reported to liquefy on certain anniversaries." },
  "07-07": { name:"Palladius of Ireland", title:"Bishop", type:"reflection", text:"Sent by Pope Celestine I in 431 as the first bishop to Ireland — predating Patrick's famous mission — to minister to the Irish 'already believing in Christ.'", wiki:"Palladius_(bishop)", bio:"His mission shows that Irish Christianity pre-existed Patrick, though Patrick's personality and later writings eclipsed Palladius in popular memory." },
  "07-08": { name:"Aquila and Priscilla", title:"Disciples", type:"reflection", text:"A Jewish-Christian couple, tentmakers like Paul, who became two of his closest companions, hosting house churches in Corinth, Ephesus, and Rome.", wiki:"Priscilla_and_Aquila", born:"1st century", bio:"Paul calls them 'my co-workers in Christ Jesus' who 'risked their necks' for him; they appear in Acts, Romans, and two of his letters." },
  "07-10": { name:"Seven Brothers, Martyrs with Felicitas", title:"Martyrs", type:"reflection", text:"Seven sons of a Roman widow named Felicitas, each martyred separately under Emperor Antoninus Pius in the 2nd century after their mother refused to sacrifice to pagan gods.", wiki:"Felicitas_and_her_seven_sons", bio:"Their story — a mother witnessing each child's death — was so moving that Felicitas became one of the most popular saints of the Roman martyrology." },
  "07-12": { name:"John Gualbert", title:"Abbot", type:"reflection", text:"A Florentine nobleman who, on his way to murder the man who killed his brother, met the murderer in a narrow passage and could not strike him down when he spread his arms in a cross — and instead embraced him.", wiki:"John_Gualbert", born:"c. 995", bio:"He went straight to a church to pray, founded the Vallombrosan monastic order, and spent the rest of his life in reform of the Church." },
  "07-17": { name:"Martyrs of Compiègne", title:"Martyrs", type:"reflection", text:"Sixteen Carmelite nuns of Compiègne, France, guillotined during the Reign of Terror in 1794 for their religious vows — reportedly singing the Salve Regina as they mounted the scaffold one by one.", wiki:"Martyrs_of_Compiègne", bio:"Their story is the subject of Francis Poulenc's opera Dialogues of the Carmelites. Their prioress was the last to die." },
  "07-18": { name:"Symphorosa and Her Sons", title:"Martyrs", type:"reflection", text:"A Roman widow and her seven sons said to have been martyred under Emperor Hadrian for refusing to sacrifice to the gods on behalf of the emperor's new villa at Tivoli.", wiki:null, bio:"Their collective story echoed the biblical narrative of the Maccabean martyrs and was widely cited in early Christian preaching on the courage of family faith." },
  "07-19": { name:"Macrina the Younger", title:"Virgin", type:"reflection", text:"Eldest sister of Basil the Great and Gregory of Nyssa, a woman of remarkable intelligence who converted her household into a monastic community and was regarded by her brothers as their spiritual teacher.", wiki:"Macrina_the_Younger", born:"c. 330", bio:"Gregory wrote her biography as a philosophical dialogue, placing some of the era's finest theological reflections on death and the soul in her mouth." },
  "07-27": { name:"Pantaleon", title:"Martyr", type:"reflection", text:"A physician to the Emperor Maximian who converted to Christianity and was martyred for it — the olive tree he was chained to during execution reportedly burst into bloom when he died.", wiki:"Pantaleon", bio:"One of the Fourteen Holy Helpers of medieval medicine; his cult is particularly strong in Venice, whose dialect form of his name — Pantalone — gave us the word 'pantaloons.'" },
  "07-28": { name:"Innocent I", title:"Pope", type:"reflection", text:"A 5th-century pope who claimed, amid the chaos of Rome's sack by the Visigoths in 410, a sweeping authority over the universal Church — asserting that no major church decision could be made without Rome's approval.", wiki:"Pope_Innocent_I", bio:"He was absent from Rome negotiating with Emperor Honorius when Alaric's Visigoths entered the city — the first sack of Rome in 800 years." },
  "08-03": { name:"Lydia of Thyatira", title:"Disciple", type:"reflection", text:"A businesswoman in Philippi who, according to Acts 16, was the first recorded Christian convert in Europe and who invited Paul and his companions to stay in her home.", wiki:"Lydia_of_Thyatira", born:"1st century", bio:"Described as 'a dealer in purple cloth' — a luxury trade — she is venerated as a patron of dyers and of Christian business people in the Eastern Orthodox tradition." },
  "08-15": { name:"The Assumption of the Blessed Virgin Mary", title:"Solemnity", type:"quote", text:"My soul magnifies the Lord, and my spirit rejoices in God my Savior.", source:"Mary's Magnificat, Luke 1:46-47", wiki:null, bio:"Defined as dogma by Pope Pius XII in 1950, the Assumption holds that Mary was taken body and soul into heavenly glory at the end of her earthly life — the Church's oldest Marian feast, celebrated since the 5th century." },
  "08-17": { name:"Hyacinth of Poland", title:"Priest", type:"reflection", text:"A Dominican missionary who evangelised Poland, the Baltic, Russia, and possibly Scandinavia, becoming one of the most important figures in the Christianisation of northern Europe.", wiki:"Hyacinth_of_Poland", born:"c. 1185", bio:"Legend holds he rescued the Blessed Sacrament and a heavy stone statue of Mary by carrying both during a Mongol raid — prompting his title 'Apostle of the North.'" },
  "08-18": { name:"Helena", title:"Empress", type:"reflection", text:"Mother of Emperor Constantine, she made a pilgrimage to the Holy Land in her old age and, according to tradition, identified the sites of Christ's Passion and discovered the True Cross.", wiki:"Helena_(empress)", born:"c. 248", bio:"She built the Church of the Nativity in Bethlehem and the Church of the Holy Sepulchre in Jerusalem, still among the most visited pilgrimage sites in the world." },
  "08-26": { name:"Teresa of Jesus Jornet Ibars", title:"Religious", type:"reflection", text:"A Spanish nun who founded the Little Sisters of the Abandoned Elderly, one of the first religious congregations dedicated entirely to the care of poor elderly people.", wiki:"Teresa_Jornet_Ibars", born:"1843", bio:"By the time of her death, her congregation had opened nearly a hundred homes for the elderly across Spain and Latin America." },
  "08-30": { name:"Margaret Ward", title:"Martyr", type:"reflection", text:"An English laywoman hanged in 1588 for helping a Catholic priest escape prison, refusing the offer of a pardon if she would attend a Protestant church service.", wiki:"Margaret_Ward", born:"c. 1556", bio:"She is among the Forty Martyrs of England and Wales, a group canonised by Pope Paul VI in 1970 as representative of the many who died in the Elizabethan persecution." },
  "08-31": { name:"Aidan of Lindisfarne", title:"Bishop", type:"reflection", text:"An Irish monk from Iona sent to evangelise Northumbria who established the monastery of Lindisfarne as the centre of Anglo-Saxon Christianity, personally walking the countryside to preach rather than riding on horseback.", wiki:"Aidan_of_Lindisfarne", bio:"Bede, who rarely praised without qualification, described him as almost beyond praise — a man whose life exactly matched what he preached." },
  "09-01": { name:"Giles", title:"Hermit", type:"reflection", text:"A 7th-century hermit whose legend places him in southern France, where he reportedly lived in a cave and was fed by a hind until hunters pursuing the deer discovered his hermitage.", wiki:"Giles", born:"c. 650", bio:"One of the most popular saints of the Middle Ages, with over 160 English churches dedicated to him; patron of cripples, beggars, and blacksmiths." },
  "09-02": { name:"Ingrid Elofsdotter of Sweden", title:"Religious", type:"reflection", text:"A 13th-century Swedish noblewoman who, after pilgrimage to Rome, founded the first Dominican convent in Scandinavia at Skänninge.", wiki:null, born:"c. 1220", bio:"She is venerated as a patron saint of Sweden in the Dominican tradition and beatified by Pope John Paul II in 1998." },
  "09-04": { name:"Rose of Viterbo", title:"Virgin", type:"reflection", text:"An Italian girl who began preaching publicly on street corners for the Pope's cause against the Emperor at age ten, was exiled with her family by the pro-imperial city government, and died at seventeen.", wiki:"Rose_of_Viterbo", born:"1233", bio:"She is venerated as a patron of her home city of Viterbo and of exiles and those separated from their homeland." },
  "09-06": { name:"Bega of Northumbria", title:"Virgin", type:"reflection", text:"An Irish princess who, according to legend, fled an unwanted marriage by sea and landed in Cumbria, where she founded a community of women devoted to prayer and service of the poor.", wiki:null, born:"7th century", bio:"St Bees Head in Cumbria takes its name from her; St Bees Priory was founded in the 12th century near the site of her reputed landing." },
  "09-07": { name:"Regina of Alise", title:"Martyr", type:"reflection", text:"A 3rd-century Burgundian girl who, according to her legend, was beheaded for refusing the marriage and pagan demands of the Roman prefect Olibrius — the same figure who confronted Margaret of Antioch.", wiki:"Regina_of_Alise", bio:"She is patron of Alise-Sainte-Reine in Burgundy, where her legend places her martyrdom, and her cult became one of the most popular in medieval France." },
  "09-10": { name:"Thomas of Villanova", title:"Bishop", type:"reflection", text:"An Augustinian friar who became Archbishop of Valencia and was known as the 'Father of the Poor' for his practice of giving away almost every coin that came to him.", wiki:"Thomas_of_Villanova", born:"1486", bio:"He reportedly arrived in Valencia for his episcopal consecration on a borrowed mule, having given away his travel money before he even left the monastery." },
  "09-11": { name:"Adelphus of Metz", title:"Bishop", type:"reflection", text:"A 5th-century Bishop of Metz whose long and peaceful episcopate helped consolidate Christianity in the region of Lorraine and who founded monasteries throughout his diocese.", wiki:null, bio:"His cathedral in Metz became one of the great churches of the Frankish kingdom, later rebuilt into the Gothic masterpiece that still stands today." },
  "09-18": { name:"Joseph of Cupertino", title:"Priest", type:"reflection", text:"An Italian Franciscan friar so prone to ecstatic levitation during Mass and prayer that his superiors had to restrict his public ministry, as his flights caused disruption — and drew enormous crowds.", wiki:"Joseph_of_Cupertino", born:"1603", bio:"Patron of aviators, astronauts, and students sitting examinations, his levitations were reportedly witnessed by hundreds of people including sceptical philosophers." },
  "09-22": { name:"Maurice and Companions", title:"Martyrs", type:"reflection", text:"A Roman officer commanding a legion of Egyptian Christian soldiers who, according to tradition, refused an order to persecute fellow Christians in Switzerland and were collectively executed around 286.", wiki:"Maurice_(martyr)", bio:"Patron of soldiers, swordsmiths, and the Swiss Guard, his city of Saint-Maurice in Switzerland became an important early pilgrimage site." },
  "09-24": { name:"Our Lady of Walsingham", title:"Optional Memorial", type:"reflection", text:"A Marian shrine in Norfolk, England, established after a noblewoman reportedly received a vision of the Holy House of Nazareth in 1061, making Walsingham one of the most important pilgrimage sites of medieval England.", wiki:"Our_Lady_of_Walsingham", bio:"Destroyed under Henry VIII, the shrine was partially restored in the 20th century; it now draws pilgrims from Anglican, Catholic, and Orthodox traditions." },
  "09-25": { name:"Finbar of Cork", title:"Bishop", type:"reflection", text:"An Irish monk who founded the monastery that grew into the city of Cork and became its first bishop, patron saint of both Cork and the Diocese of Ross.", wiki:"Finnbarr_of_Cork", born:"c. 550", bio:"His hermitage at Gougane Barra, a remote lake surrounded by mountains in County Cork, remains a place of pilgrimage and one of Ireland's most beautiful landscapes." },
  "10-03": { name:"Thomas of Hereford", title:"Bishop", type:"reflection", text:"An English bishop whose insistence on the Church's independence from royal interference led to years of conflict with Edward I, and who died in Italy seeking papal support.", wiki:"Thomas_de_Cantilupe", born:"c. 1218", bio:"The last Englishman to be canonised before the Reformation, his tomb in Hereford Cathedral became one of medieval England's most important pilgrimage destinations." },
  "10-08": { name:"Pelagia of Antioch", title:"Penitent", type:"reflection", text:"A celebrated actress and dancer in 4th-century Antioch who, overhearing a bishop's sermon, was converted on the spot, gave away her jewels and wealth, and spent the rest of her life as a hermit in Jerusalem.", wiki:"Pelagia_of_Antioch", bio:"Her dramatic conversion was recorded by a deacon named James who was present and became one of the most widely read conversion stories of late antiquity." },
  "10-10": { name:"Francis Borgia", title:"Priest", type:"reflection", text:"A Spanish duke and viceroy of Catalonia who, after seeing the decomposed face of his patron Empress Isabella when her coffin was opened, resolved to 'serve no master who could die' and became a Jesuit priest.", wiki:"Francis_Borgia", born:"1510", bio:"He later became Superior General of the Jesuits and helped establish the Roman College, now the Gregorian University." },
  "10-12": { name:"Wilfrid of York", title:"Bishop", type:"reflection", text:"An Anglo-Saxon bishop who championed the Roman method of calculating Easter at the Synod of Whitby in 664, persuading the Northumbrian church to align with Rome rather than the Irish tradition.", wiki:"Wilfrid", born:"c. 633", bio:"His contentious career saw him appeal directly to Rome against his own archbishop — an early and dramatic use of papal authority in an English church dispute." },
  "10-13": { name:"Edward the Confessor", title:"King", type:"reflection", text:"England's last Anglo-Saxon king before the Conquest, remembered for rebuilding Westminster Abbey and for a reign characterised by personal piety and relative peace.", wiki:"Edward_the_Confessor", born:"c. 1003", bio:"He died just days after the consecration of Westminster Abbey, which he never lived to see completed; it remains the coronation church of English and British monarchs." },
  "10-20": { name:"Maria Bertilla Boscardin", title:"Virgin", type:"reflection", text:"An Italian nun known as 'the goose' by her novice-mistress for her apparent slowness, who became a devoted nurse of diphtheria patients and soldiers wounded in World War I.", wiki:"Maria_Bertilla_Boscardin", born:"1888", bio:"She died of cancer at thirty-three, and her combination of simple obedience and loving care was cited at her canonisation as a model of hidden holiness." },
  "10-21": { name:"Ursula and Companions", title:"Martyrs", type:"reflection", text:"A legendary British princess who, according to medieval tradition, led a group of virgin companions on pilgrimage and was massacred by Huns near Cologne for refusing to marry their chieftain.", wiki:"Ursula", bio:"The wildly varying accounts of her companions — from 11 to 11,000 — reflect the growth of her legend rather than historical record; but her cult was enormous in medieval Europe." },
  "10-25": { name:"Crispin and Crispinian", title:"Martyrs", type:"reflection", text:"Two brothers said to have been Roman missionaries to northern France who worked by night as shoemakers to fund their preaching, and were martyred around 285.", wiki:"Crispin_and_Crispinian", bio:"Patron saints of cobblers and leatherworkers; Shakespeare's Henry V gives the 'St Crispin's Day speech' before the Battle of Agincourt, fought on their feast day in 1415." },
  "10-26": { name:"Evaristus", title:"Pope and Martyr", type:"reflection", text:"Traditionally the fifth pope, serving around 100 AD, who is said to have organised the Roman Church into formal parishes — among the earliest recorded instances of parish structure.", wiki:"Pope_Evaristus", bio:"Very little is historically verifiable about his life; he is included in the oldest Roman martyrologies as a martyr, though the evidence is uncertain." },
  "10-27": { name:"Frumentius of Ethiopia", title:"Bishop", type:"reflection", text:"A young Roman castaway who became a court official in the Kingdom of Aksum, gradually introduced Christianity there, and was consecrated by Athanasius as the first Bishop of Aksum.", wiki:"Frumentius", born:"c. 300", bio:"Called 'Abba Salama' — Father of Peace — by the Ethiopian Church, he is venerated as the Apostle of Ethiopia, one of the oldest Christian nations in the world." },
  "10-29": { name:"Narcissus of Jerusalem", title:"Bishop", type:"reflection", text:"A 2nd-century Bishop of Jerusalem who reportedly performed a miracle — changing water into oil for Easter lamps when the supply ran out — and lived as a hermit for years after being falsely accused.", wiki:"Narcissus_of_Jerusalem", born:"c. 99", bio:"He reportedly lived to over a hundred years of age, returning from his self-imposed hermit exile to lead Jerusalem's church again near the end of his life." },
  "10-30": { name:"Dorothy of Montau", title:"Mystic", type:"reflection", text:"A Prussian laywoman and mother of nine who, after her husband's death, became an anchoress walled into a cell beside Marienwerder Cathedral, where she lived on mystical visions and the Eucharist until her death.", wiki:"Dorothy_of_Montau", born:"1347", bio:"She is patron saint of Prussia and Lithuania, and her mystical writings are among the most vivid vernacular spiritual accounts of the late medieval period." },
  "10-31": { name:"All Hallows Eve", title:"Vigil of All Saints", type:"reflection", text:"The eve of the great feast of All Saints, when the Church begins its remembrance of the communion of saints and all the faithful departed.", wiki:null, bio:"The word Halloween is a contraction of 'All Hallows Eve'; the ancient custom of praying for the dead and honouring saints on this night predates many of the secular traditions now associated with it." },
  "11-01": { name:"All Saints", title:"Solemnity", type:"quote", text:"Blessed are the pure in heart, for they shall see God.", source:"Matthew 5:8, from the Beatitudes read at this feast", wiki:null, bio:"A feast honouring every saint in heaven, known and unknown, established in Rome in the 7th century and extended to the universal Church by Pope Gregory IV in 835." },
  "11-02": { name:"All Souls", title:"Commemoration of the Faithful Departed", type:"reflection", text:"On this day the Church prays for all the faithful who have died, united with them in the belief that prayer can help those still being purified before the fullness of heaven.", wiki:null, bio:"The practice of praying for the dead is ancient in both Judaism and Christianity; this specific feast was established by St Odilo of Cluny in 998 and spread across Europe within two centuries." },
  "11-05": { name:"Elizabeth and Zechariah", title:"Parents of John the Baptist", type:"reflection", text:"In Luke's Gospel, Zechariah the priest and his wife Elizabeth receive the angel Gabriel's announcement that they will have a son in old age — John, who will prepare the way for the Messiah.", wiki:null, bio:"Elizabeth is described as a relative of Mary, and their meeting forms the setting of the Visitation, at which Mary speaks the Magnificat." },
